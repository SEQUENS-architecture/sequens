entification and Prioritisation","Vocabulary Content Connection","Every vocabulary item taught is directly connected to the lesson's key concept. No vocabulary taught because it is interesting or tangentially related.","Connection between vocabulary and lesson concept explicit; teacher can articulate it","Vocabulary chosen without clear connection to lesson; tangentially related words taught","Vocabulary-concept connection made explicit in student-facing materials - not left for students to infer"],["D2.P02.S02.2.1",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Teaching Protocol","Definition Before Use","Teacher provides a brief, precise, accessible definition of the word before asking students to use it. Students do not encounter a word in a task before knowing what it means.","Definition provided before use; brief and accessible; not after students encounter it confused","Students encounter word in task before definition; definition given after confusion; order reversed","Definition provided in bilingual format for EAL learners; visual definition available for SEND learners"],["D2.P02.S02.2.2",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Teaching Protocol","Contextual Example","Word is used in a sentence that demonstrates its meaning in context - not a dictionary definition only. Teacher models the word in use before students use it.","Contextual example provided; teacher uses word correctly in sentence; models use","Dictionary definition only; word not used in context; students unsure how to deploy it","Multiple contextual examples across different contexts for EAL learners to see the range of use"],["D2.P02.S02.2.3",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Teaching Protocol","Student Use Required","After teacher modelling, students are required to use the new word - in a sentence, in writing, or in a paired exchange. Passive exposure is not sufficient.","Student use required; structured opportunity provided; not optional","Student use not required; passive exposure only; no production of the word","Student use format adapted for language level - EAL learners may use word in L1 first, then L2"],["D2.P02.S02.2.4",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Teaching Protocol","Visual Anchor","New vocabulary is displayed with an image, diagram, or symbol wherever possible. Visual anchor makes the word memorable and accessible for repeated reference.","Visual anchor displayed alongside word; image or diagram used; persistent display","Word displayed without visual; text only; no memory hook; no persistent display","Visual anchors are particularly effective for EAL learners and for learners with verbal processing difficulties"],["D2.P02.S03.3.1",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Retention and Review","Vocabulary Retrieval in Subsequent Lessons","Previously taught vocabulary retrieved explicitly in lessons after initial teaching. Not assumed to be retained - deliberately retrieved.","Retrieval of prior vocabulary in subsequent lessons; spaced from initial teaching; structured retrieval","Vocabulary introduced once and not returned to; retention assumed; no review","Retrieval format adapted for accessibility - matching, cloze, visual prompt - not always written definitions"],["D2.P02.S03.3.2",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Retention and Review","Vocabulary Display Duration","Key vocabulary remains displayed throughout the unit - not just the lesson in which it was introduced. Display is a long-term reference, not a lesson decoration.","Vocabulary display persists through unit; updated incrementally; not removed after lesson","Vocabulary display changed every lesson; prior vocabulary removed; no persistent reference","Persistent vocabulary display is a low-effort, high-impact scaffold - particularly for EAL and SEND learners"],["D2.P02.S03.3.3",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Retention and Review","Teacher Vocabulary Modelling","Teacher uses taught vocabulary consistently in their own speech and feedback - modelling precise academic language use at all times.","Teacher uses taught vocabulary in feedback and explanation; models precision; consistent","Teacher uses informal equivalents; vocabulary taught but not modelled by teacher; inconsistent","Teacher modelling is the primary language model for EAL learners - consistency of use is critical"],["D2.P02.S03.3.4",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Retention and Review","Vocabulary Across Curriculum","Where vocabulary appears in multiple subjects, this is named explicitly - building cross-curricular vocabulary networks.","Cross-curricular vocabulary connections made explicit; vocabulary network built; connections named","Vocabulary treated as subject-specific only; cross-curricular connections not noted; isolated learning","Cross-curricular vocabulary connections particularly supportive for EAL learners building academic language across content areas"],["D2.P03.S01.1.1",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Think-Aloud Protocol","Decision Narration","Teacher narrates every significant decision during modelling: 'I'm choosing X because Y.' Decisions are named explicitly - not implied or assumed.","Explicit decision narration; 'because' language present; reasoning audible","Teacher shows process without explaining decisions; reasoning not narrated; product visible but not process","Decision narration slowed for processing needs; key decision moments marked visually"],["D2.P03.S01.1.2",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Think-Aloud Protocol","Uncertainty Modelling","Teacher names genuine uncertainty or difficulty during think-aloud - 'I'm not sure yet, so I'm going to...' Models metacognitive self-management.","Uncertainty named and managed explicitly; metacognitive language modelled; not performance","Teacher performs confidence even when uncertain; difficulty hidden; no metacognition modelled","Uncertainty modelling normalises not-knowing and supports risk-taking - important for learners with perfectionist or anxiety profiles"],["D2.P03.S01.1.3",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Think-Aloud Protocol","Process Primacy","The think-aloud is about the process - the steps, the decisions, the sequence - not about arriving at the answer quickly. Process is foregrounded.","Process narration dominant; answer is secondary; steps are named","Product is the focus; teacher moves quickly to answer; steps not named; process subordinated","Process primacy is slower and more accessible for all learners - particularly those with processing difficulties"],["D2.P03.S01.1.4",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Think-Aloud Protocol","Pace Calibration","Think-aloud is delivered at a pace that allows students to track the reasoning. Not rushed. Teacher deliberately slows at decision points.","Deliberate pace; slowed at decision points; students able to follow; teacher reads the room","Think-aloud rushed; students cannot follow; pace matches teacher's own thinking speed not student tracking speed","Pace calibration explicitly planned - not improvised. Timed during rehearsal."],["D2.P03.S02.2.1",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Worked Example Architecture","Single Example Discipline","One worked example - complete, fully annotated, carefully selected. Not two or three examples rushed through. One, done with precision.","One example; fully complete before moving on; not multiple examples","Multiple examples rushed; teacher moves to second before first is clear; breadth over depth","Single example remains visible throughout lesson - particularly important for SEND learners who need persistent reference"],["D2.P03.S02.2.2",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Worked Example Architecture","Step Annotation Naming","Each step of the worked example is named, numbered, and annotated. Annotations are specific - not 'step 1' but 'identify the key information.'","Steps named specifically; numbered; annotated; referenced during explanation","Steps not annotated; annotation vague ('step 1'); annotations not referenced","Annotated worked example provided as a desk card for SEND learners who cannot copy from board"],["D2.P03.S02.2.3",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Worked Example Architecture","Annotation Persistence","Step annotations remain visible during guided and independent practice. Not erased or hidden after the I Do phase.","Annotations visible throughout lesson; not erased; students can reference during practice","Annotations erased before guided practice; reference removed when students need it most","Persistent annotations are a scaffolding mechanism - their presence during independent practice is intentional"],["D2.P03.S02.2.4",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Worked Example Architecture","Example Selection Rationale","The example chosen represents the most common, important, and transferable application. Teacher can articulate why this specific example was chosen.","Example selection rationale clear; typical not atypical; teacher can articulate why","Example chosen for convenience or familiarity; atypical example chosen; selection not considered","Example selection considers the cultural relevance and accessibility for the specific learner group"],["D2.P03.S03.3.1",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Error and Misconception Modelling","Pre-Planned Error","The error modelled is anticipated in lesson planning - it is the most commonly encountered misconception for this content. Not improvised.","Error identified in planning; most common misconception; not improvised during lesson","Error improvised during lesson; random not strategic; error not the most common","Error planning includes SEND-specific common errors where relevant - not just typical errors"],["D2.P03.S03.3.2",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Error and Misconception Modelling","Deliberate Error Introduction","Teacher explicitly names the error before demonstrating it: 'I'm going to show you the most common mistake students make here.' Error is framed as expected and correctable.","Error framed explicitly; 'most common mistake' language; named before demonstrated","Error introduced without framing; students unsure if error is deliberate; confusing","Explicit framing reduces anxiety - normalising mistakes is particularly important for perfectionist learners"],["D2.P03.S03.3.3",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Error and Misconception Modelling","Error Correction Process Narration","The correction is narrated in full - 'Here's where I went wrong. I made this error because... The correct approach is...' Process of correction is as visible as the error.","Correction process narrated; 'where I went wrong' named; reason for error explained; correct process visible","Error shown without correction narration; correction quick and unexplained; process hidden","Narrated correction provides a correction script that students can internalise and apply independently"],["D2.P03.S03.3.4",2,"Showing them how","Explicit Modelling","Teacher Thinks Aloud (I Do)","Error and Misconception Modelling","Misconception Connection","The error modelled is the most commonly encountered misconception - not a rare edge case. Connection to likely student experience named explicitly.","Connection to common student experience named; 'many students find this...' framing","Rare or unusual error modelled; not connected to common student experience; atypical","Knowledge of domain-specific misconceptions held by the coaching team and shared with teachers during rehearsal preparation"],["D2.P04.S01.1.1",2,"Showing them how","Explicit Modelling","Questioning Architecture","Accountability Questioning System","Question Before Name","Question posed to the whole class before any individual is named. All students have to think. No student knows yet whether they will be called on.","Question posed to class; pause; name given after question; all students thinking","Name given first; other students disengage; only named student needs to think","Question-before-name is a low-effort, high-impact technique that equalises cognitive load across the class"],["D2.P04.S01.1.2",2,"Showing them how","Explicit Modelling","Questioning Architecture","Accountability Questioning System","No-Hands Default","Teacher calls on students without hands being raised as the default. Volunteer hands are supplemented by deliberate calling. All students are accountable.","No-hands calling used; distribution across class; volunteer hands not the only route to participation","Volunteer hands only; same students always respond; unraised-hand students invisible","No-hands calling is introduced gradually and with sensitivity to learners with high anxiety - private safe-call option available"],["D2.P04.S01.1.3",2,"Showing them how","Explicit Modelling","Questioning Architecture","Accountability Questioning System","Calling Equity","Teacher tracks who has been called on across the lesson. Distribution is deliberately varied - not random. All students are called on with roughly equal frequency.","Distribution tracked; teacher aware of who has been called; variation evident","Same students called repeatedly; some students never called; no tracking; random not equitable","Calling equity includes ensuring SEND and EAL learners are called on - not protected from participation"],["D2.P04.S01.1.4",2,"Showing them how","Explicit Modelling","Questioning Architecture","Accountability Questioning System","Opt-Out Prevention","When a student says 'I don't know', teacher provides structured support to reach an answer - not accepting the opt-out. Student is supported to participate, not released from participation.","Opt-out not accepted; structured support provided; student reaches an answer","Opt-out accepted; 'OK, does anyone else know?' moves immediately away from student; pattern reinforced","Support for opt-out students is differentiated - EAL learners may need first-language support; SEND learners may need a reduced question"],["D2.P04.S02.2.1",2,"Showing them how","Explicit Modelling","Questioning Architecture","Response Quality Management","Thinking Pause Protocol","After posing a question, teacher waits a minimum of 5 seconds before accepting a response. Wait time is consistent, visible, and non-negotiable.","5-second wait time consistently applied; teacher silent during wait; not shortened","Wait time absent; teacher accepts first response immediately; students do not think","Wait time is culturally significant - some cultures associate quick response with respect; this is discussed and explained explicitly"],["D2.P04.S02.2.2",2,"Showing them how","Explicit Modelling","Questioning Architecture","Response Quality Management","Complete Answer Requirement","Partial correct answers are prompted to completion - not accepted as sufficient. 'That's a good start - can you add...' The bar for 'right' is a complete answer.","Partial answers prompted to completion; 'can you add...' language; bar is complete answer","Partial answers accepted; 'yes, good' to incomplete response; bar lowered","Complete answer requirement communicated clearly to EAL learners - sentence frames support full responses"],["D2.P04.S02.2.3",2,"Showing them how","Explicit Modelling","Questioning Architecture","Response Quality Management","Answer Upgrading","When a student gives a correct, complete answer, teacher prompts for explanation or elaboration: 'Can you tell us why?' Correct is not the ceiling.","Upgrade prompt used after correct answer; 'why' or 'how' follow-up; correct is not the end","Correct answer accepted and moved on; no upgrade; correct is the ceiling; students learn only to be right","Answer upgrading differentiated - EAL learners not required to upgrade verbally if language is a barrier; written upgrade available"],["D2.P04.S02.2.4",2,"Showing them how","Explicit Modelling","Questioning Architecture","Response Quality Management","Incorrect Answer Protocol","Incorrect answers are used as teaching opportunities - unpacked, not dismissed. Teacher engages with why the answer might have seemed right.","Incorrect answer engaged with; reason for error explored; redirected not dismissed","Incorrect answer dismissed; 'no, anyone else?'; error not engaged with; moved past quickly","Incorrect answer engagement normalises error - important for all learners, especially those from educational cultures where error is stigmatised"],["D2.P04.S03.3.1",2,"Showing them how","Explicit Modelling","Questioning Architecture","Whole-Class Response Techniques","All-Write Protocol","All students write a response to a question before any student speaks. Writing happens simultaneously. Speaking follows after writing. Prevents free-riding on early responders.","All students writing before any speaking; simultaneous; speaking follows writing","Speaking allowed before all have written; some students copy from neighbours; free-riding","All-write adapted for non-writers - drawing, diagrams, or symbols acceptable as responses"],["D2.P04.S03.3.2",2,"Showing them how","Explicit Modelling","Questioning Architecture","Whole-Class Response Techniques","Show-Me Protocol","Students display responses simultaneously on a signal - mini whiteboards, response cards, or fingers. All responses visible at once. Teacher reads the room.","Simultaneous display on signal; all responses visible at same time; teacher reads full response landscape","Students show responses individually or sequentially; teacher sees only some; free-riding possible","Show-me adapted for students who cannot write - verbal to partner, stamp, or alternative physical response"],["D2.P04.S03.3.3",2,"Showing them how","Explicit Modelling","Questioning Architecture","Whole-Class Response Techniques","Structured Pair Discussion","Paired discussion is structured: specific question, defined time, both partners speak, accountable reporting back. Not 'talk to your partner about...' without structure.","Structured question; timed; both partners speak; accountable reporting back","Unstructured pair talk; teacher unclear about content of discussion; one partner dominates; no accountability","Paired discussion with EAL learners structured to allow first-language discussion before English reporting where helpful"],["D2.P04.S03.3.4",2,"Showing them how","Explicit Modelling","Questioning Architecture","Whole-Class Response Techniques","Choral Response Design","Choral response used only for single right-answer retrieval of previously taught content - factual recall only. Not for opinion, analysis, or complex answers.","Choral response limited to factual retrieval; never used for complex answers; specific content only","Choral response used for opinion or complex answers; students give different answers simultaneously; confusion","Choral response is accessible for EAL learners - hearing the answer said aloud is valuable even when production is limited"],["D2.P04.S03.3.5",2,"Showing them how","Explicit Modelling","Questioning Architecture","Whole-Class Response Techniques","Unison Response Architecture","Established call-and-response patterns for frequently needed responses - e.g. a content retrieval pattern built into classroom culture. Rehearsed and embedded over time.","Call-and-response patterns established; automatic after embedding; used for specific content types","No established patterns; teacher ad hoc; no anticipation of response; not embedded","Call-and-response patterns make participation accessible for learners who benefit from predictability in interaction"],["D2.P05.S01.1.1",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Scaffolded Shared Construction","Partial Completion Design","Partially completed example provided. Gap is placed at the point of highest cognitive demand. Students provide the decision; teacher provides the structure.","Gap at highest demand point; student provides decision; teacher provides structure; deliberate","Teacher completes too much; gap too easy; students not required to think; gap is trivial","Gap difficulty adapted for SEND learners - same position in structure but reduced cognitive demand of the decision"],["D2.P05.S01.1.2",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Scaffolded Shared Construction","Misconception Anticipation","The most commonly occurring error for this content is addressed proactively during guided practice - before students make it: 'Most students at this point will think... Here's why that's not right.'","Specific misconception named and addressed before it occurs; proactive not reactive","Misconception addressed only after students make it; no anticipation; reactive only","Misconception anticipation is explicit and stated - does not rely on students inferring from a non-example"],["D2.P05.S01.1.3",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Scaffolded Shared Construction","Success Criteria Co-construction","Success criteria for guided practice are shown, discussed, or partially constructed with students - not given from above and accepted passively.","Success criteria visible and discussed; students understand what success looks like; not imposed","Success criteria absent; students unclear what they are aiming for; criteria not visible","Success criteria displayed visually - specific enough that students can self-assess independently"],["D2.P05.S01.1.4",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Scaffolded Shared Construction","Guided Practice Pacing","Pace of guided practice allows all students to participate - not rushed toward independence. Teacher waits for responses and manages pace deliberately.","Pace allows all participation; teacher waits; not rushed; students not left behind","Guided practice rushed to reach independence; some students unable to keep up; pace driven by fast responders","Pacing sensitivity includes awareness of EAL learners' processing time requirements"],["D2.P05.S02.2.1",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Checking for Understanding During Guided Practice","Response Ratio Monitoring","Teacher tracks distribution of responses during guided practice - not same students always. Deliberate and varied distribution. Tracking is active, not passive.","Distribution tracked during guided practice; varied; teacher active in who responds","Same volunteers respond in guided practice; pattern not interrupted; no tracking","Monitoring includes ensuring SEND and EAL learners are included in the response distribution"],["D2.P05.S02.2.2",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Checking for Understanding During Guided Practice","Sequential Question Architecture","Questions during guided practice move in a planned sequence - from recall to application to explanation. Not random or circular.","Question sequence planned; recall first, application second, explanation third; not random","Questions random; circular; same level throughout; sequence not planned","Question sequence documented in lesson planning - not improvised during guided practice"],["D2.P05.S02.2.3",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Checking for Understanding During Guided Practice","Hinge Question Use","One critical diagnostic question at the key decision point of the guided practice. Teacher has planned what they will do depending on the response - three possible responses, three planned actions.","Hinge question at decision point; teacher has planned response for all three outcomes; used","No hinge question; no planned diagnostic moment; teacher reactive to whatever emerges","Hinge question available in visual or written format for EAL and SEND learners who may process differently"],["D2.P05.S02.2.4",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Checking for Understanding During Guided Practice","Wrong Answer in Guided Practice","Wrong answers during guided practice are engaged with - not glossed over. Teacher uses wrong answers to expose thinking and redirect.","Wrong answers engaged with; thinking exposed; redirection evident; not glossed over","Wrong answers in guided practice dismissed or ignored; moved past quickly; not used as teaching opportunity","Wrong answer engagement normalised - class culture established where trying and being wrong is valued"],["D2.P05.S03.3.1",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Release Decision","Readiness Evidence","Release to independent practice is based on evidence of readiness - not time elapsed or lesson pace. Evidence is gathered from the checking mechanisms during guided practice.","Release based on readiness evidence; specific evidence named; not time-driven","Release at fixed point in lesson regardless of readiness; time-driven; no readiness check","Readiness evidence gathered includes SEND learners' readiness - they may need continued guided support while others are released"],["D2.P05.S03.3.2",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Release Decision","Partial Release Option","Some students may be released to independence while others continue in guided practice. Partial release is planned and managed without drawing attention to who remains in guided mode.","Partial release used where appropriate; managed discreetly; those in guided practice not stigmatised","All released simultaneously regardless of readiness; no partial release; all or nothing","Partial release allows SEND learners to remain in guided mode longer without being singled out"],["D2.P05.S03.3.3",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Release Decision","Re-entry Protocol","Students who struggle during independent practice can re-enter a guided practice mode - a structured mechanism is in place. Re-entry is not a failure.","Re-entry mechanism in place; students know how to signal need; re-entry normalised","No re-entry mechanism; struggling students abandoned in independent mode; re-entry is failure","Re-entry protocol is particularly important for SEND learners who may need guided support in an unpredictable pattern"],["D2.P05.S03.3.4",2,"Showing them how","Explicit Modelling","Guided Completion - We Do","Release Decision","Release Clarity","Students know exactly when they have been released to independence and what they do next. Release is an explicit, communicated moment - not implied.","Release explicitly communicated; students clear about their status; next task known","Release implied but not stated; students unsure whether they are in guided or independent mode; ambiguity","Release clarity is critical for learners who cannot infer transitional expectations - needs to be stated not implied"],["D2.P06.S01.1.1",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Hinge Point Design","Hinge Question Identification","Teacher identifies the single most diagnostic question in the lesson during planning - the question that best reveals whether the key concept has been understood.","Hinge question identified in planning; single question; most diagnostic; written in plan","No hinge question planned; checking improvised; teacher unsure what to ask; reactive","Hinge question piloted or anticipated with SENCO for learners who may need question accessible in different format"],["D2.P06.S01.1.2",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Hinge Point Design","Hinge Question Criteria","The hinge question tests understanding of the key concept - not surface recall or procedural knowledge. Wrong answers reveal specific misconceptions, not just general confusion.","Question tests conceptual understanding; wrong answers reveal specific misconceptions; criteria met","Question tests surface recall only; wrong answers reveal nothing specific; question too vague","Hinge question accessible - language demand not exceeding the conceptual demand being tested"],["D2.P06.S01.1.3",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Hinge Point Design","Hinge Placement in Lesson","Hinge question is placed at the lesson's key decision point - before independent practice begins. It is the gate between guided and independent.","Hinge placed at decision point; before independent practice; gating function clear","Hinge at end of lesson; too late to act on; not placed at decision point; irrelevant to pacing","Hinge placement considers EAL learners' processing requirements - enough time to formulate a response"],["D2.P06.S01.1.4",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Hinge Point Design","Three-Outcome Planning","Before the lesson, teacher plans their response to three possible outcomes: all right, some right, mostly wrong. Each outcome has a planned teacher action.","Three outcomes planned with actions; teacher clear what they will do; responsive not reactive","No planned responses to outcomes; teacher reactive; unclear what to do with hinge data","Three-outcome planning includes a SEND-specific fourth outcome where needed"],["D2.P06.S02.2.1",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Diagnostic Response Systems","Whole-Class Response Design","Hinge question requires all students to respond simultaneously - not volunteer hands. Format enables teacher to read all responses quickly.","Whole-class simultaneous response; teacher reads full class; not volunteer-only","Volunteer hands for hinge question; only some students respond; diagnostic incomplete","Response format adapted - visual, card, or physical response for non-writers"],["D2.P06.S02.2.2",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Diagnostic Response Systems","Response Reading Speed","Teacher can read the whole-class response to a hinge question within 30 seconds. Format is designed for speed - not analysis.","Response read within 30 seconds; format designed for speed; teacher makes immediate decision","Response requires lengthy analysis; teacher unsure of outcome; format too complex","Simple response format (agree/disagree, A/B/C, show finger number) enables rapid reading"],["D2.P06.S02.2.3",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Diagnostic Response Systems","Decision Protocol","Teacher makes a public decision based on the hinge outcome: re-teach if below threshold, continue if above. Decision is transparent and acted upon immediately.","Decision made and acted on; transparent; immediate; based on data threshold","No decision made; hinge data ignored; lesson continues regardless of outcome; reactive","Decision protocol communicated to students - normalises the teacher responding to their understanding"],["D2.P06.S02.2.4",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Diagnostic Response Systems","Reteach Trigger Point","Reteach is triggered when 40% or more of the class have not demonstrated understanding. Below this trigger point, individual support is provided. Above it, whole-class reteach.","40% threshold applied; individual below threshold; whole-class above; evidence-based","Reteach triggered by impression or by one student's error; threshold not applied; inconsistent","Threshold application considers whether SEND learners are included in the 40% calculation deliberately"],["D2.P06.S03.3.1",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Ongoing Formative Checking","Check at Every Transition","Formative check occurs at every significant transition point in the lesson - not only at the hinge. Checks are brief and non-interruptive.","Check at each transition; not only hinge; brief; non-interruptive; consistent","Check only at hinge; transitions unchecked; checking absent during portions of lesson","Ongoing checking includes monitoring SEND learner engagement - not just whole-class response"],["D2.P06.S03.3.2",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Ongoing Formative Checking","Non-Interruptive Checking","Checks during independent practice are silent and non-interruptive - circulation, mini whiteboard scan, show-me on signal. Flow of student work is protected.","Non-interruptive checking mechanism; student work flow uninterrupted; teacher reading while students work","Teacher stops class to check understanding during independent practice; work flow interrupted","Non-interruptive checking allows SEND learners to maintain their working flow without disruption"],["D2.P06.S03.3.3",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Ongoing Formative Checking","Check Documentation","Teacher records check outcomes briefly - a mental or written note - that informs planning for the next lesson. Checking is not just in-lesson; it feeds forward.","Check outcomes inform next-lesson planning; brief documentation; feed-forward evident","Checks happen but are not documented; no feed-forward; information lost; each lesson independent","Documentation of SEND learner responses informs planning for their specific pathway"],["D2.P06.S03.3.4",2,"Showing them how","Explicit Modelling","Checking for Understanding - Diagnostic Architecture","Ongoing Formative Checking","Student Self-Assessment Calibration","Over time, students are trained to self-assess their understanding against visible criteria. Self-assessment is trained, practised, and calibrated - not just asked for.","Self-assessment trained; calibrated against criteria; improves over time; not just requested","Self-assessment requested but not trained; students inaccurate; not calibrated; tick-box only","Self-assessment scaffold provided - sentence stems, scales, or visual cues for learners who need structure"],["D2.P07.S01.1.1",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Task Architecture","Three-Part Task Release","Three-sentence release: what to do, for how long, to what standard. Spoken and displayed simultaneously. Students begin without further teacher input.","Three-part release spoken and displayed; students begin without re-asking; clarity complete","Instructions unclear; students ask what to do; time not stated; standard not communicated","Task release displayed visually; sentence-by-sentence pace for EAL and processing needs"],["D2.P07.S01.1.2",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Task Architecture","Success Anchor Display","Teacher briefly shows and narrates what successful completion looks like - specific and visible throughout independent work. Students can self-assess against it.","Success anchor displayed and narrated; visible throughout independent work; specific","No success anchor; students unsure what quality looks like; standard vague or absent","Success anchor particularly important for anxious and perfectionist learners who need to know when 'enough' is enough"],["D2.P07.S01.1.3",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Task Architecture","Task Accessibility","The independent task is accessible without teacher support once released. If students require teacher input to begin, the task is not yet appropriate for independent practice.","All students can begin without teacher support; accessibility confirmed before release","Teacher required immediately after release; some students cannot begin; task too hard for independence","Parallel task available for SEND learners - same knowledge focus, adapted accessibility"],["D2.P07.S01.1.4",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Task Architecture","Resource Availability","All resources students might need during independent practice are visible and accessible before release. Students do not need to ask the teacher for materials.","Resources available before release; students know where they are; no requests needed during practice","Students require materials after release; teacher distributing during independent practice; disruption","Pre-positioned individualised resources for SEND learners - worked examples, vocabulary cards, prompt sheets"],["D2.P07.S02.2.1",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Monitoring Protocol","Pre-Planned Monitoring Route","Teacher's route during independent practice is pre-planned - covering all areas of the room. Not improvised or reactive. All students visited within 5 minutes.","Pre-planned route; all areas covered; all students visited within 5 minutes","Teacher at desk; circling same group; reactive movement; some students unvisited","Monitoring route includes SEND learners' positions - discreet check without singling out"],["D2.P07.S02.2.2",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Monitoring Protocol","Lean-In Protocol","Teacher checks student work by leaning in briefly - proximity monitoring, not conversation. Minimises disruption to independent work flow.","Lean-in check without conversation; minimally disruptive; flow protected","Teacher initiates conversation with every student during monitoring; disrupts flow","Lean-in monitoring respects SEND learners' need for uninterrupted working time"],["D2.P07.S02.2.3",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Monitoring Protocol","Targeted Intervention","Support during independent practice goes to those who need it - not offered to everyone. Teacher is making active decisions about where to invest support time.","Targeted; teacher makes active decisions; not offered to all; based on monitoring evidence","Support offered to everyone regardless of need; teacher stops at all desks equally; not targeted","SEND learners are targeted for support - not left to the TA as the only avenue"],["D2.P07.S02.2.4",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Monitoring Protocol","Independence Protection","During timed independent practice, teacher does not answer questions that students can resolve independently - directs to available resources instead.","Students directed to resources; teacher does not answer independence-resolvable questions","Teacher answers all questions during independent practice; independence not protected; resources unused","Independence protection differentiated - SEND learners have lower threshold for teacher intervention; established and documented"],["D2.P07.S03.3.1",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Error Correction and Reteach","Live Error Correction","Quiet, immediate, specific correction during independent practice. Names the error, not the person. One point per exchange. Does not stop the class.","Quiet; immediate; specific; one point; does not interrupt others' practice","Class stopped for individual error; loud correction; vague; multiple points; disruptive","Error correction tone consistent - calm and matter-of-fact regardless of frequency or frustration"],["D2.P07.S03.3.2",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Error Correction and Reteach","Error Pattern Recognition","As teacher circulates, they recognise when the same error is appearing across multiple students. Decision threshold: 40%+ triggers reteach.","Error pattern recognised during monitoring; 40% threshold applied; reteach decision made","Teacher corrects individual errors without noticing pattern; 40% threshold not applied; reteach decision impressionistic","Error patterns for SEND learners tracked separately - individual patterns inform SEND-specific intervention"],["D2.P07.S03.3.3",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Error Correction and Reteach","Targeted Reteach Design","When reteach is triggered, it is brief and targeted - addresses the specific error that emerged, not the full explanation. Students return to independent practice after reteach.","Reteach brief and targeted; addresses specific error; independent practice resumes after","Full lesson re-taught; reteach proportionate to impression not evidence; practice not resumed","SEND learners may receive individual reteach while class continues independently - structured TA involvement"],["D2.P07.S03.3.4",2,"Showing them how","Explicit Modelling","Independent Release - You Do","Error Correction and Reteach","Re-entry to Independence","After reteach, independent practice resumes. Learning time is protected. Reteach does not consume the remaining lesson.","Practice resumes after reteach; learning time protected; reteach is a brief intervention","Reteach consumes remaining lesson; independent practice abandoned; learning time not protected","Return to independence after reteach is supported with a prompt - 'try the next question using what we just practised'"],["D3.P01.S01.1.1",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Vocabulary Demand Analysis","Vocabulary Burden Assessment","Before each lesson, teacher assesses the vocabulary burden for specific learners - identifying words that are likely inaccessible due to language level, not cognitive ability.","Vocabulary burden assessed per identified learner; assessment before lesson; distinguishes language from cognition","Generic assessment; vocabulary burden not assessed per learner; no distinction between language and cognition","Vocabulary burden assessment conducted with EAL lead for new EAL learners entering the class mid-year"],["D3.P01.S01.1.2",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Vocabulary Demand Analysis","Concept vs Language Distinction","Teacher distinguishes between concepts that are difficult (requiring cognitive support) and concepts that are accessible but linguistically obscured (requiring language support). Different interventions for each.","Distinction made between conceptual difficulty and language difficulty; different interventions planned","No distinction; all difficulty treated as cognitive; language barriers addressed with cognitive scaffolds","This distinction is critical for accurate SEND identification - EAL learners misidentified as having learning difficulties when language is the barrier"],["D3.P01.S01.1.3",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Vocabulary Demand Analysis","Pre-Teaching Vocabulary Priority","From all the vocabulary in the lesson, teacher selects the 2-3 most critical words for EAL and SEND pre-teaching. Selection is based on which words most unlock comprehension.","High-leverage vocabulary identified for pre-teaching; 2-3 maximum; unlock comprehension","All vocabulary pre-taught; too much; priority not identified; time inefficient","Priority identification conducted with EAL and SENCO leads for complex learner profiles"],["D3.P01.S01.1.4",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Vocabulary Demand Analysis","Vocabulary Gap Tracking","Over time, teacher tracks which vocabulary gaps persist for individual learners - informing future pre-teaching priorities and long-term language development planning.","Vocabulary gap tracking evident; individual tracking; informs future planning; longitudinal","Vocabulary treated as lesson-by-lesson; no tracking; no longitudinal view; gaps not accumulated","Long-term vocabulary gap data shared with EAL lead and included in SEND support planning"],["D3.P01.S02.2.1",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Accessible Pre-Teaching","Pre-Teaching Timing","Vocabulary pre-teaching happens before the lesson - not during. 3-5 minutes maximum. Targeted to the specific lesson content.","Pre-teaching before lesson; timed at 3-5 minutes; lesson-specific content","Pre-teaching during lesson; too long; not connected to lesson; happens when problem emerges","Pre-teaching time protected in timetable for identified learners - not optional or squeezed"],["D3.P01.S02.2.2",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Accessible Pre-Teaching","Bilingual Vocabulary Support","Where possible and appropriate, new vocabulary is introduced alongside the learner's first language - not as the primary medium but as a bridge to English meaning.","First-language bridge used where appropriate; bridging not replacing; teacher or TA facilitated","English-only pre-teaching even when language barrier is primary; first language unused; bridge absent","Bilingual support requires coordination with EAL lead and knowledge of learner's dominant language"],["D3.P01.S02.2.3",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Accessible Pre-Teaching","Word-Image Pre-Teaching","Visual images paired with vocabulary during pre-teaching - image shows the concept, word labels it. Image is specific to the lesson context.","Image-word pairs used in pre-teaching; specific to lesson; not generic","Text-only pre-teaching; no visual; word without context or image","Image-word pre-teaching particularly accessible for learners with limited English and for those with verbal processing needs"],["D3.P01.S02.2.4",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","Accessible Pre-Teaching","Pre-Teaching Documentation","Pre-teaching vocabulary and the approach used is documented briefly - enabling continuity across teachers and informing TA briefings.","Pre-teaching documented; vocabulary and approach noted; continuity enabled","No documentation; pre-teaching not recorded; TA unaware; inconsistency across teachers","Documentation shared with all adults who teach the identified learner during the day"],["D3.P01.S03.3.1",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","In-Lesson Vocabulary Accessibility","Persistent Vocabulary Display","Pre-taught vocabulary displayed visually throughout the lesson - not removed after introduction. Students can reference it during independent work.","Vocabulary display persistent; visible throughout; updated as new vocabulary added","Vocabulary displayed briefly then removed; not available during independent practice","Vocabulary display accessible in format - font size, colour contrast, positioning - for learners with visual needs"],["D3.P01.S03.3.2",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","In-Lesson Vocabulary Accessibility","Vocabulary Reference Tools","Individual vocabulary reference tools available for identified learners - word cards, personal glossaries, bilingual dictionaries. Available without drawing attention.","Individual vocabulary tools available; accessible without requesting; discreet","Vocabulary reference requires requesting; draws attention; not available; generic not individual","Vocabulary tools developed with and for the specific learner - not generic materials"],["D3.P01.S03.3.3",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Vocabulary Architecture","In-Lesson Vocabulary Accessibility","In-Context Vocabulary Modelling","During instruction, teacher consistently models vocabulary in context - using target words in sentences, pointing to displayed vocabulary when using them.","Teacher models vocabulary in use; points to display; consistent; in context","Vocabulary introduced then not modelled in use; display not referenced; inconsistent","In-context modelling provides language input - particularly important for EAL learners in the early stages of acquisition"],["D3.P02.S01.1.1",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Scaffold Design","Scaffold Selection Decision","Teacher makes a deliberate, documented decision about which scaffold is highest-leverage for this specific lesson and these specific learners. Not the same scaffold every lesson.","Scaffold selection documented; connected to lesson content; varies across lessons","Same generic scaffold always used; not connected to lesson; selection not documented","Scaffold selection decision made in conversation with SENCO and EAL lead for complex learner profiles"],["D3.P02.S01.1.2",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Scaffold Design","Visual Scaffold Design","Visual support - diagram, model, worked example, process map - designed specifically for this lesson's content. Not a generic, reused visual.","Content-specific visual; designed for this lesson; not reused generically","Generic visual reused; not connected to lesson content; same visual every lesson","Individual visual at learner's desk - not requiring them to read from the board or manage materials"],["D3.P02.S01.1.3",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Scaffold Design","Language Scaffold Design","Sentence frames, vocabulary banks, or stem starters targeted to this task's specific language demands. Not a generic writing frame.","Task-specific language scaffold; matched to language demand of this task; targeted","Generic writing frame; not matched to task; always the same","Language scaffold calibrated to learner's current language level - not a single scaffold for all EAL learners"],["D3.P02.S01.1.4",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Scaffold Design","Scaffold Pre-Positioning","Scaffolds are at the learner's desk before the lesson begins - not distributed reactively when the student struggles. Discreet pre-positioning avoids stigma.","Scaffold pre-positioned at desk; before lesson; discreet; not reactive","Scaffold given reactively when student struggles; draws attention; stigmatising; reactive","Pre-positioning is discussed and agreed with the learner where possible - normalising the scaffold as a tool"],["D3.P02.S01.1.5",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Scaffold Design","Worked Example Provision","Additional worked example pre-planned for identified learners - same content as class, additional scaffold. At desk before task begins, not given during independent work.","Worked example at desk before task; same content as class; pre-positioned","Worked example given reactively; different content; absent; given during independent work","Worked example discussed with learner in pre-teaching - they understand the scaffold before the lesson"],["D3.P02.S02.2.1",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Pre-Teaching for Lesson Access","Concept Pre-Teaching","Identified learners receive targeted pre-teaching of the key concept before the main lesson - not vocabulary only, but the core idea. 3-5 minutes maximum.","Concept pre-teaching before lesson; key idea focused; 3-5 minutes; teacher or TA delivered","Pre-teaching absent; reactive when student struggles; too long; content not connected to lesson","Concept pre-teaching uses concrete or visual representations - matching the C-P-A approach of the main lesson"],["D3.P02.S02.2.2",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Pre-Teaching for Lesson Access","Worked Example Walk-Through","During pre-teaching, teacher or TA walks through a worked example with the learner - the same example that will appear as a scaffold during independent practice.","Walk-through of scaffold worked example during pre-teaching; learner familiar with it during lesson","No walk-through of scaffold; learner encounters scaffold for first time during lesson","Walk-through paced to the learner - not rushed; questions encouraged during pre-teaching"],["D3.P02.S02.2.3",3,"Reaching every learner","Adaptive Scaffolding","Pre-Planned Scaffold Architecture","Pre-Teaching for Lesson Access","Pre-Teaching Differentiation","Pre-teaching is differentiated across identified learners - not all learners receive the same pre-teaching. Content and approach adapted to individual need.","Pre-teaching differentiated; individual adaptations; not one-size-for-all","Same pre-teaching for all SEND/EAL learners; not differentiated; individual needs not addressed","Pre-teaching differentiation informed by current EHC plan targets and EAL stage"],["D3.P03.S01.1.1",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Deployment Precision","Challenge Point Identification","Teacher identifies the specific point of challenge in the lesson at which additional scaffold will be needed - planned, not improvised. Scaffold is ready at that point.","Challenge point identified in planning; scaffold ready at that point; planned","Scaffold deployment improvised; reactive when student struggles; scaffold not ready","Challenge points for SEND learners identified with SENCO - specific not general"],["D3.P03.S01.1.2",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Deployment Precision","Targeted Not Universal","Additional scaffolds deployed to learners who need them - not to the whole class. Universal scaffold deployment undermines independence for those who do not need it.","Scaffold targeted to identified learners; not universal; independence of others protected","Scaffold given to whole class; independence undermined; need not assessed","Targeting managed discreetly - other students not aware of who is receiving additional scaffold"],["D3.P03.S01.1.3",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Deployment Precision","Scaffold Timing","Scaffold deployed at the planned challenge point - not pre-emptively (before the challenge) and not reactively (only after the student has struggled significantly).","Scaffold at planned challenge point; not pre-emptive; not reactive; timing deliberate","Scaffold given before challenge occurs; or given only after extended struggle; timing poor","Timing calibrated to SEND learner's specific processing speed and challenge tolerance"],["D3.P03.S02.2.1",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Progressive Removal","Removal Sequence Planning","Teacher plans the sequence for removing scaffolds across lessons - what is removed when, and in what order. Removal is planned, not decided ad hoc.","Removal sequence documented in planning; order planned; timeline specified","No removal plan; scaffold remains indefinitely; removal ad hoc; not planned","Removal sequence agreed with learner where possible - builds metacognitive awareness of own development"],["D3.P03.S02.2.2",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Progressive Removal","Explicit Communication of Removal","Removal of a scaffold is communicated explicitly to the learner before it happens: 'Next week we're going to try without the sentence frame - you're ready for that.' Learner is prepared.","Removal communicated explicitly before it happens; learner prepared; framing positive","Removal silent and sudden; learner surprised; scaffold disappears without explanation; anxiety-provoking","Removal communication is part of the coaching conversation with the teacher - agreed with SENCO for SEND learners"],["D3.P03.S02.2.3",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Progressive Removal","Partial Removal Option","Scaffolds can be partially removed - e.g. scaffold available but not presented; scaffold condensed; scaffold without visual image. Graduated removal is more sustainable than full removal.","Partial removal used as intermediate step; graduated approach; not all-or-nothing","Scaffold either present or absent; no partial removal; sudden full removal","Partial removal particularly important for learners with anxiety - avoids the destabilising experience of full sudden removal"],["D3.P03.S02.2.4",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Progressive Removal","Dependency Monitoring","Teacher monitors for scaffold dependency - a learner who is not progressing toward independence despite consistent scaffolding. Dependency is a signal to review the scaffold, not to add more.","Dependency monitored; identified when present; reviewed with SENCO; scaffold reviewed not added to","Dependency not monitored; scaffold added when dependency grows; increasing scaffolds","Dependency review is a SENCO conversation - not an assumption that the learner cannot achieve independence"],["D3.P03.S03.3.1",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Participation Monitoring","Participation Tracking System","Teacher tracks participation of SEND, EAL, and quieter learners across the lesson - using a simple system. Not impressionistic. Data informs adaptation.","Tracking system evident; includes SEND/EAL; simple; informs adaptation","Participation impressionistic; SEND/EAL not specifically tracked; no data; no adaptation","Tracking system designed not to draw attention to those being tracked - background monitoring"],["D3.P03.S03.3.2",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Participation Monitoring","Non-Verbal Participation Inclusion","Participation tracking includes non-verbal responses - gestures, physical indicators, written responses, show-me formats. Non-verbal participation counts.","Non-verbal participation tracked and counted; included in participation picture","Participation tracked only for verbal responses; non-verbal learners appear non-participatory; inaccurate","Non-verbal participation formats designed with the learner - they choose their preferred response mode"],["D3.P03.S03.3.3",3,"Reaching every learner","Adaptive Scaffolding","Responsive Scaffolding","Participation Monitoring","Adaptation from Participation Data","When participation data reveals a learner is consistently not participating, teacher adapts - modality, scaffold, support, or task format. Data drives action.","Participation data drives adaptation; action taken when pattern identified; specific adaptation","Participation data noted but not acted on; patterns not identified; no adaptation","Adaptation decisions for SEND learners made with SENCO - not unilateral teacher decisions"],["D3.P04.S01.1.1",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Language Objectives","Language Objective Setting","Every lesson for EAL learners has a language objective alongside the content objective. Language objective specifies the language function and form students will practise.","Language objective present; specifies function and form; alongside content objective; planned","Content objective only; no language objective; language development not planned; implicit","Language objectives set with EAL lead - not teacher-designed alone for early-stage EAL learners"],["D3.P04.S01.1.2",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Language Objectives","Language Function Identification","Teacher identifies the language function required in the lesson - explaining, describing, comparing, sequencing, arguing. Instruction targets this function explicitly.","Language function identified; explicitly targeted in instruction; vocabulary and frames match function","No language function identified; generic language support; not matched to task demands","Language function identification builds teacher knowledge of academic language - supported by EAL lead"],["D3.P04.S01.1.3",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Language Objectives","Academic Language Modelling","Teacher explicitly models academic language - the formal, subject-specific register of the discipline - not just everyday conversational English.","Academic register modelled; subject-specific language used and named; not only conversational English","Teacher uses conversational English only; academic register not modelled; EAL learners acquire informal not academic","Academic language modelling is important for all learners - particularly important for those without academic English at home"],["D3.P04.S02.2.1",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Comprehensible Input","Input Pitch Calibration","Teacher calibrates the language level of input to be comprehensible to EAL learners - slightly above current language level, not simplified to the point of cognitive reduction.","Input pitched above current level but comprehensible; cognitive demand maintained; language accessible","Input too complex for EAL learners; or input simplified to the point of reducing cognitive demand; no calibration","Input calibration requires knowledge of individual EAL learners' current English level - assessed with EAL lead"],["D3.P04.S02.2.2",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Comprehensible Input","Multi-Modal Delivery","Instruction delivered through multiple modalities simultaneously - visual, auditory, and kinaesthetic where possible. EAL learners can access meaning through different channels.","Multiple modalities in instruction; visual and auditory at minimum; modalities support each other","Auditory-only instruction; no visual support; EAL learners dependent on language alone","Multi-modal delivery benefits all learners - not positioned as an EAL accommodation"],["D3.P04.S02.2.3",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Comprehensible Input","Speech Clarity and Pacing","Teacher speech is clear, measured, and at a pace that allows processing time. Technical vocabulary is enunciated clearly. Complex sentences are broken into shorter units.","Clear enunciation; measured pace; shorter sentences; technical vocabulary clear","Fast speech; complex sentences; technical vocabulary not emphasised; EAL learners cannot process","Speech clarity and pacing a professional skill - developed through deliberate practice and coaching feedback"],["D3.P04.S02.2.4",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Comprehensible Input","Comprehension Checking","Teacher checks EAL learner comprehension frequently - not assuming that quiet means understanding. Comprehension checks are targeted and specific.","Frequent comprehension checks of EAL learners; targeted; specific; not assuming quiet means understood","No specific EAL comprehension checks; quiet assumed to be understanding; checks only whole-class","Comprehension checks designed to be low-stakes - private, brief, non-performative"],["D3.P04.S03.3.1",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Academic Language Development","Structured Academic Discussion","Explicit frameworks for academic discussion - sentence stems, debate structures, dialogue formats - made available and taught so that EAL learners can participate in formal academic language.","Structured discussion frameworks available; taught not assumed; EAL learners supported to participate","Discussion assumed accessible; no frameworks; EAL learners opt out; participation not structured","Discussion frameworks benefit all learners - positioned as a thinking tool not an EAL accommodation"],["D3.P04.S03.3.2",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Academic Language Development","Writing Frame Progression","Writing frames used at the level appropriate to EAL stage - from fully structured at early stages to minimally scaffolded at advanced stages. Progression tracked.","Writing frames matched to EAL stage; progression tracked; frame reduced as proficiency grows","Same writing frame for all EAL learners regardless of stage; no progression; no tracking","EAL stage tracking conducted with EAL lead; informed by national EAL assessment frameworks"],["D3.P04.S03.3.3",3,"Reaching every learner","Adaptive Scaffolding","EAL Instructional Architecture","Academic Language Development","Oral Language Before Written","Oral language practice before written output - EAL learners articulate their thinking verbally (in L1 or L2) before being asked to produce written academic language.","Oral rehearsal before written; L1 permitted in rehearsal; writing follows oral","Written output expected without oral rehearsal; L1 prohibited in thinking phase; EAL learners blocked","Oral-first approach benefits all learners with language processing needs - not exclusive to EAL"],["D3.P05.S01.1.1",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","Real-Time Explanation Adjustment","Alternative Explanation Preparation","Teacher prepares at least one alternative explanation for the key concept before the lesson. If the primary explanation doesn't work, the alternative is ready.","Alternative explanation prepared in planning; ready to deploy; lesson-specific","No alternative explanation planned; teacher improvises when primary fails; no preparation","Alternative explanations planned with different modalities - visual, concrete, narrative - to address different learning needs"],["D3.P05.S01.1.2",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","Real-Time Explanation Adjustment","Explanation Adjustment Decision","When checking indicates the primary explanation hasn't worked, teacher makes a deliberate decision to adjust - not to repeat the same explanation more loudly or slowly.","Adjustment decision made; different explanation delivered; not repetition at same approach","Same explanation repeated; increased volume or slower pace; no actual adjustment","Adjustment decision includes whether SEND learners need individual explanation rather than whole-class reteach"],["D3.P05.S01.1.3",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","Real-Time Explanation Adjustment","Modality Shift","When adjusting explanation, teacher shifts modality - if explanation was verbal, shift to visual; if abstract, shift to concrete. The change is a genuine modality shift.","Modality shift evident; different channel used; genuine change not superficial","Explanation adjusted in content but not modality; still verbal/abstract; no real change","Modality shift planned in advance - teacher has materials ready for the alternative modality"],["D3.P05.S02.2.1",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","Pace Modulation","Deliberate Slowing","At key conceptual moments, teacher deliberately slows down - allows processing time, pauses before moving on, holds the silence. Pace is a tool, not a consequence of delivery speed.","Deliberate slowing at key moments; pauses used; silence held; not rushing to next point","Teacher moves at constant or increasing pace; key moments not distinguished; no deliberate slowing","Slowing at key moments is particularly important for learners with processing difficulties - gives them the time they need"],["D3.P05.S02.2.2",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","Pace Modulation","Pace Awareness","Teacher reads the room during instruction - facial expressions, body language, and response patterns indicate whether the pace is appropriate. Teacher adjusts based on what they observe.","Teacher reads room during instruction; pace adjusted based on observation; responsive","Teacher lectures at fixed pace regardless of room response; does not read the room; unresponsive","Room reading includes specifically monitoring SEND and EAL learners' engagement and comprehension signals"],["D3.P05.S02.2.3",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","Pace Modulation","Re-Sequencing Decision","When instruction reveals a prior knowledge gap, teacher makes a deliberate decision to re-sequence - going back to an earlier concept before proceeding. Not ignoring the gap.","Re-sequencing decision made explicitly; prior knowledge gap addressed; sequence adjusted","Gap identified but ignored; instruction proceeds over the gap; not addressed","Re-sequencing for whole class or individual - decision made based on how many are affected"],["D3.P05.S03.3.1",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","In-Lesson Adaptation","Task Modification During Lesson","When a task is clearly inaccessible for identified learners during the lesson, teacher modifies it - adjusting format, breaking into steps, or providing additional structure.","Task modification made during lesson when needed; specific modification; responsive","Task inaccessibility observed but not addressed; student left to struggle; no modification","Task modification for SEND learners agreed with SENCO as a pre-planned option - not improvised from scratch"],["D3.P05.S03.3.2",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","In-Lesson Adaptation","Grouping Flexibility","Teacher adjusts grouping during the lesson based on observed need - bringing students together for additional support or separating for independent challenge.","Grouping adjusted during lesson; based on observed need; deliberate","Grouping fixed throughout lesson; no adjustment; observed need not addressed","Grouping flexibility includes social and sensory considerations for SEND learners - not just academic grouping"],["D3.P05.S03.3.3",3,"Reaching every learner","Adaptive Scaffolding","Adaptive Teaching During Instruction","In-Lesson Adaptation","Scaffold Escalation or Reduction","During the lesson, teacher may increase or decrease scaffold based on observed evidence - adding support if needed, removing if independence is evident.","Scaffold adjusted during lesson; both escalation and reduction; evidence-based","Scaffold fixed throughout lesson; not adjusted; evidence of need or independence not acted on","Scaffold adjustment is discussed with TA where relevant - coordinated response"],["D3.P06.S01.1.1",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","Pre-Lesson Planning and Briefing","Joint Planning Protocol","Teacher and TA plan together - at minimum weekly, ideally per lesson. TA contributes to scaffold design, not just receives instructions. Planning is a professional dialogue.","Joint planning time protected; TA contributes to planning; two-way dialogue; not instruction-giving only","TA receives instructions in corridor; no joint planning; one-way briefing; TA has no input","Joint planning time is a leadership responsibility - protected in the timetable, not squeezed into corridors"],["D3.P06.S01.1.2",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","Pre-Lesson Planning and Briefing","TA Briefing Completeness","Before each lesson, TA has: the lesson content, the target learners, the scaffolding approach, the specific prompts to use, and what to do if the learner is struggling.","TA briefed on all five elements; documented; briefing before lesson; TA can act on brief","TA briefed on target learners only; or not briefed at all; incomplete; no action brief","Briefing documentation is brief (1 page maximum) - not burdensome but comprehensive enough for TA to act confidently"],["D3.P06.S01.1.3",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","Pre-Lesson Planning and Briefing","Prompt Rehearsal","Before the lesson, teacher and TA briefly rehearse the specific prompts TA will use. TA knows the exact language they will use - not improvised under pressure.","Prompts rehearsed before lesson; TA knows exact language; not improvised","TA improvises prompts during lesson; language inconsistent with teacher; not rehearsed","Prompt rehearsal is brief (2-3 minutes) - high value, low time cost"],["D3.P06.S01.1.4",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","Pre-Lesson Planning and Briefing","Learner Context Briefing","TA briefed on any significant context for the lesson - a learner's emotional state if known, an upcoming trigger, a change to routine that may affect regulation.","Context briefing included; TA aware of relevant learner context; pre-lesson","TA unaware of learner context; encounters difficulties unprepared; context not shared","Context briefing is a safeguarding-informed process - only relevant information shared; confidentiality respected"],["D3.P06.S02.2.1",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","In-Lesson TA Positioning and Practice","Strategic Positioning","TA positioned to maximise support reach - not anchored to one learner. Position agreed in planning. TA rotates between identified learners. Position changes based on lesson phase.","TA movement evident; multiple learners reached; position changes with lesson phase; agreed in planning","TA anchored to one learner throughout; no movement; position not agreed; reactive positioning","TA positioning considers sensory and social needs - some learners need TA at distance not proximity"],["D3.P06.S02.2.2",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","In-Lesson TA Positioning and Practice","Prompting Over Telling","TA language is question-and-prompt dominant - not answer-giving. TA waits for the learner to attempt before intervening. Independence is prioritised over task completion.","Question/prompt ratio dominant; learner attempts before TA intervenes; independence prioritised","TA gives answers; intervenes before attempt; task completion prioritised over independence; dependency built","Prompting over telling is a practised skill - developed through coaching and modelled by teacher"],["D3.P06.S02.2.3",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","In-Lesson TA Positioning and Practice","Graduated Prompt Hierarchy","TA uses a planned hierarchy of prompts - from minimal (gesture, pointing) to moderate (question) to substantial (model). Starts at minimal, escalates only if needed.","Graduated hierarchy used; starts minimal; escalates only if needed; hierarchy known","TA uses same level of intervention always; no graduation; full support given regardless of need","Graduated hierarchy documented and shared - TA has the hierarchy written as a reference"],["D3.P06.S02.2.4",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","In-Lesson TA Positioning and Practice","Invisibility Principle","TA works in a way that does not draw attention to the learner being supported - quiet, discreet, positioned to avoid singling out the learner they are supporting.","Discreet; learner not singled out; TA presence not attention-drawing","TA draws attention to the learner; conversations audible; positioning conspicuous; learner stigmatised","Invisibility principle discussed with the learner - they are part of deciding how support is delivered"],["D3.P06.S03.3.1",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","TA Impact and Development","TA Impact Monitoring","Teacher monitors TA effectiveness during lessons - not by evaluating TA, but by watching learner independence. If dependency is forming, teacher signals TA to shift approach.","Teacher monitors TA-learner interaction; independence tracked; shift signal used if needed","Teacher unaware of TA interactions; dependency forms unnoticed; no monitoring","TA impact monitoring is part of coaching lead's walkthrough data - not just teacher observation"],["D3.P06.S03.3.2",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","TA Impact and Development","TA Feedback Protocol","TA receives structured feedback on their practice - not just directed. Brief, specific, non-evaluative feedback from teacher or coaching lead at regular intervals.","TA receives specific feedback; structured protocol; regular; not only when problems arise","TA receives no feedback; direction only; feedback only when something goes wrong","TA feedback delivered using the same non-evaluative language as teacher feedback - consistent professional culture"],["D3.P06.S03.3.3",3,"Reaching every learner","Adaptive Scaffolding","TA Deployment Architecture","TA Impact and Development","TA Professional Development","TA receives professional development in the same areas as teachers - scaffolding, questioning, prompting, vocabulary support - not generic TA CPD.","TA CPD aligned with teacher CPD; domain-specific; connected to implementation focus","TA CPD generic or absent; not connected to teaching and learning focus; separated from teacher development","TA professional development is a leadership responsibility - resourced, scheduled, and valued"],["D4.P01.S01.1.1",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Retrieval and Spacing Architecture","Spaced Retrieval Design","Retrieval tasks target content from 3-7 lessons prior - not last lesson. Spacing is planned in the scheme of work. Content returns at increasing intervals: days, then weeks, then months.","Retrieval spaced from current content; 3-7 lessons back; planned in scheme; increasing intervals","Retrieval from last lesson only; spacing not planned; content not revisited over time","Spaced retrieval is equally important for SEND learners - spacing adapted to match memory consolidation rates where relevant"],["D4.P01.S01.1.2",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Retrieval and Spacing Architecture","Retrieval Task Format","Format of retrieval is low-stakes, timed, and individual - not collaborative or graded. The format reduces performance anxiety and maximises honest retrieval effort.","Low-stakes format; timed; individual; not graded; anxiety-reducing","Graded retrieval; public performance; collaborative format enables free-riding; high-stakes","Retrieval format adapted for SEND - visual, oral, or matching formats available without changing the knowledge demand"],["D4.P01.S01.1.3",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Retrieval and Spacing Architecture","Forgetting Curve Awareness","Retrieval timing is informed by understanding of the forgetting curve - content is retrieved just before it would be forgotten, not immediately after it was learned.","Retrieval timing reflects forgetting curve logic; timed to moment of near-forgetting; not immediate","Retrieval immediately after learning; no gap; timing based on lesson sequence not memory","Forgetting curve timing embedded in scheme of work planning - not improvised lesson by lesson"],["D4.P01.S02.2.1",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Interleaving and Difficulty Design","Interleaving Planning","Practice sessions mix content from different topics - not blocked practice on one topic. Interleaving is planned in the scheme of work, not rando
