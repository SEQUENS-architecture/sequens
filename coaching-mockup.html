m.","Multiple topics within one practice session; not blocked; planned in scheme","Blocked practice only - one topic per session; interleaving absent; easier but less effective","Interleaving reduced initially for learners with high cognitive load needs - built gradually as capacity increases"],["D4.P01.S02.2.2",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Interleaving and Difficulty Design","Productive Struggle Zone","Practice difficulty is calibrated so that effort is required but success is achievable. Not too easy (no retrieval effort), not too hard (abandonment).","Students showing effort; not trivially completing; not abandoning; calibrated to monitoring data","Too easy - all complete quickly; too hard - widespread non-completion; difficulty not calibrated","Productive struggle zone adjusted for SEND learners - same content focus, calibrated difficulty"],["D4.P01.S02.2.3",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Interleaving and Difficulty Design","Difficulty Progression","Across lessons, retrieval difficulty increases progressively - from supported to unsupported, from cued to uncued, from recognition to recall.","Difficulty progression documented in planning; support reduced over time; progression tracked","Same difficulty level maintained; no progression; support level constant; tracking absent","Difficulty progression for SEND learners tracked with SENCO - individual progression pathway"],["D4.P01.S03.3.1",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Practice Format Architecture","Format-Purpose Match","Practice format is matched to the purpose - retrieval uses recall formats; conceptual understanding uses application formats; procedural fluency uses repetition formats.","Format matched to purpose; different formats for different purposes; purpose articulated","Same format for all practice; format not connected to purpose; format chosen for convenience","Format-purpose match includes formats accessible for SEND and EAL learners - adapted but purposeful"],["D4.P01.S03.3.2",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Practice Format Architecture","Independent Format Selection","Practice formats that genuinely require individual effort - not formats where a partner can do the work. Independence is structural, not reliant on trust.","Format structurally independent; free-riding not possible; individual effort required","Format allows copying or free-riding; independence based on trust not structure","Independent format designed to be achievable without teacher support - includes scaffold if needed"],["D4.P01.S03.3.3",4,"Practice that sticks","Deliberate Practice Architecture","Pupil Practice Design","Practice Format Architecture","Self-Marking Architecture","Where appropriate, practice is designed so students can self-mark - answers provided after completion, criteria visible. Self-marking builds metacognitive awareness.","Self-marking built into practice design; answers available post-completion; criteria visible","No self-marking; teacher marks all; metacognitive opportunity missed; or self-marking without criteria","Self-marking criteria adapted for SEND learners - visual or simplified marking criteria available"],["D4.P02.S01.1.1",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","Practice Launch","Three-Part Launch","Task launched with three sentences: what to do, for how long, in silence. Timer set. Students begin without teacher input after the launch.","Three-sentence launch; timer visible; students begin independently; teacher silent after launch","Over-explanation before practice; students ask what to do after launch; no timer; teacher talking during practice","Visual launch instructions displayed - task, time, silence expectation - for processing needs and EAL learners"],["D4.P02.S01.1.2",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","Practice Launch","Timer Discipline","Timer is set before students begin and respected - practice ends at timer, not at teacher's discretion. Timer creates consistent expectations.","Timer set; respected; practice ends at timer; teacher does not extend without purpose","No timer; open-ended practice; teacher extends based on feel; urgency absent","Visual countdown timer particularly important for learners with time-blindness or anxiety about when tasks end"],["D4.P02.S01.1.3",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","Practice Launch","Silence Expectation","Independent practice is silent. Expectation established before practice begins - not announced, not repeated. Part of the practice culture.","Silent practice; expectation established; not announced or repeated; culture","Teacher announces silence each time; expectation not internalised; noise tolerated during practice","Silent practice supports all learners - reduces distraction and increases individual effort"],["D4.P02.S02.2.1",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","In-Practice Monitoring and Feedback","Non-Interruptive Monitoring","Teacher circulates silently during practice - reading student work, noting misconceptions, making decisions. Does not interrupt the flow of independent work.","Silent circulation; reading work; noting misconceptions; flow protected","Teacher initiates conversation with every student during practice; flow interrupted","Non-interruptive monitoring includes reading SEND learners' work - discreet check without disruption"],["D4.P02.S02.2.2",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","In-Practice Monitoring and Feedback","In-Practice Feedback Precision","When feedback is required during practice, it is quiet, specific, immediate, and one point only. Delivered at the learner's level, not broadcast.","Quiet; specific; immediate; one point; at learner's level; not broadcast","Broadcast feedback; multiple points; vague; whole class interrupted","In-practice feedback tone consistent and calm - important for anxious learners who may experience correction as threatening"],["D4.P02.S02.2.3",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","In-Practice Monitoring and Feedback","Independence Protection","Teacher does not answer questions that students can resolve independently during practice. Redirects to available resources.","Redirect to resources; independence protected; resources visible and usable","Teacher answers all questions during practice; independence undermined; resources unused","Independence protection differentiated - SEND learners have a documented threshold at which teacher intervention is appropriate"],["D4.P02.S03.3.1",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","Practice Completion and Review","Practice Close Protocol","Practice ends at the timer with a clear close signal. Students stop simultaneously. Not a gradual drift to the close.","Timer-driven close; simultaneous stop; clear signal; not a gradual drift","Close is gradual; some students continue; no clear signal; drift to discussion","Close signal is the attention signal - consistent and understood"],["D4.P02.S03.3.2",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","Practice Completion and Review","Immediate Self-Assessment","After practice, students self-assess their responses before teacher review - against criteria, answer key, or worked example. Metacognitive step.","Self-assessment before teacher review; criteria or answers provided; metacognitive step","Teacher reviews without self-assessment; metacognitive step skipped; self-assessment absent","Self-assessment scaffold provided - visual or simplified criteria for SEND learners"],["D4.P02.S03.3.3",4,"Practice that sticks","Deliberate Practice Architecture","Practice Delivery","Practice Completion and Review","Practice-to-Planning Feed-Forward","Teacher uses practice data to inform planning for the next lesson - what needs to be retrieved again, what has been consolidated, what needs different approach.","Practice data used in next-lesson planning; feed-forward evident; planning responsive","Practice data not used; planning not responsive; each lesson treated independently","Feed-forward includes SEND-specific data - individual learner retrieval patterns tracked"],["D4.P03.S01.1.1",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Hinge Question and Diagnostic Design","Hinge Question Planning","Hinge question identified in lesson planning - the single most diagnostic question for the lesson's key concept. Written in the plan, not improvised.","Hinge question in lesson plan; most diagnostic; planned not improvised","No hinge question planned; checking improvised; teacher unsure what to use","Hinge question reviewed with SENCO for accessible format for SEND learners"],["D4.P03.S01.1.2",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Hinge Question and Diagnostic Design","Wrong Answer Design","Wrong answers in the hinge question are designed to reveal specific misconceptions - not just 'wrong.' Each wrong answer reveals a different thinking error.","Wrong answers reveal specific misconceptions; each is diagnostic; designed not random","Wrong answers random; 'obviously wrong' options; diagnostic value absent","Wrong answer design informs teacher knowledge of likely errors - particularly valuable for experienced coaching leads"],["D4.P03.S01.1.3",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Hinge Question and Diagnostic Design","Three-Outcome Planning","Teacher plans their response to three hinge outcomes before the lesson: all right → proceed; some right → partial reteach; mostly wrong → full reteach. Each response planned.","Three outcomes planned with actions; teacher clear what they will do; responsive not reactive","No planned response to hinge outcomes; teacher reactive; unclear action when data arrives","Three-outcome planning includes SEND-specific fourth outcome where SEND learners show different pattern from class"],["D4.P03.S02.2.1",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Exit Ticket Architecture","Exit Ticket Design","Exit ticket tests the lesson's key concept - one question only, answered individually, in the last 3 minutes of the lesson. Designed for speed of marking and clear diagnosis.","One question; lesson's key concept; individual; last 3 minutes; designed for rapid diagnosis","Multiple questions; generic; group; at end of lesson; difficult to analyse quickly","Exit ticket format adapted for SEND learners - drawn, circled, or selected rather than written where needed"],["D4.P03.S02.2.2",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Exit Ticket Architecture","Exit Ticket Analysis Protocol","Teacher analyses exit tickets between this lesson and next. Analysis identifies: correct, partial understanding, specific misconception. 3-pile system. Takes under 5 minutes.","3-pile analysis; correct/partial/misconception; completed before next lesson; under 5 minutes","Exit tickets collected but not analysed; analysis too time-consuming; not used for planning","Analysis includes SEND learners' responses - individual tracking informs individual pathway"],["D4.P03.S02.2.3",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Exit Ticket Architecture","Exit Ticket to Planning","Exit ticket analysis drives the next lesson's planning - what to retrieve, what to reteach, what misconception to address. Explicit connection documented.","Planning explicitly informed by exit ticket analysis; connection documented; responsive planning","Exit tickets collected and analysed but not used in planning; analysis disconnected from planning","Feed-forward from exit ticket to SEND learner's individual support plan where relevant"],["D4.P03.S03.3.1",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Formative Checking Throughout","Transition Checks","Brief formative check at every significant lesson transition - not only at hinge and exit. Checks are built into the lesson structure.","Check at each transition; built into lesson; not only hinge and exit","Checking only at hinge and exit; large gaps between checks; transitions unchecked","Transition checks include SEND learner-specific monitoring - not only whole-class"],["D4.P03.S03.3.2",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Formative Checking Throughout","Whole-Class Response Frequency","Whole-class response techniques (show-me, mini whiteboard, all-write) used multiple times per lesson - not once. Frequent sampling of understanding.","Multiple whole-class responses per lesson; frequent; not single use","Whole-class response used once; or absent entirely; infrequent sampling","Whole-class response adapted for SEND learners - format adapted, cognitive demand same"],["D4.P03.S03.3.3",4,"Practice that sticks","Deliberate Practice Architecture","Formative Assessment Architecture","Formative Checking Throughout","Student-Led Assessment","Over time, students are trained to self-assess and peer-assess with accuracy - calibrated against the teacher's assessment. Self-assessment is a taught skill.","Self/peer assessment trained; calibrated; improves over time; not just requested","Self-assessment requested but not trained; inaccurate; not calibrated; tick-box only","Self-assessment scaffolded - criteria simplified and visual for SEND learners; accuracy built over time"],["D4.P04.S01.1.1",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Whole-Class Feedback Protocol","Pattern Analysis Before Feedback","Teacher identifies patterns in student work before giving feedback - common errors, common misconceptions, what most did well. Feedback responds to patterns, not individuals.","Pattern analysis before feedback delivery; common errors identified; feedback pattern-informed","Individual comments on individual books; patterns not identified; feedback not pattern-informed","Pattern analysis is more efficient and less stigmatising than individual marking with comments"],["D4.P04.S01.1.2",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Whole-Class Feedback Protocol","Whole-Class Feedback Format","Feedback delivered to the whole class in a single document or display - 'here's what I noticed across your work' - without naming individuals. Takes under 5 minutes.","One feedback document for whole class; delivered in one session; under 5 minutes","Individual written comments; time-consuming; not delivered together; fragmented","Whole-class feedback format adapted for EAL and SEND learners - visual, annotated worked example format available"],["D4.P04.S01.1.3",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Whole-Class Feedback Protocol","Error Pattern Modelling","Common errors from student work are modelled and corrected - teacher shows the class what the error looks like and how to correct it. Students see their own errors addressed without individual exposure.","Common errors modelled and corrected; class sees errors addressed; individual not exposed","Individual corrections written; student exposed; class does not benefit from common error; fragmented","Error pattern modelling normalises mistakes - important for class culture and for anxious learners"],["D4.P04.S02.2.1",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Student Feedback Response Time","Feedback Response Before New Content","Students respond to feedback - improving, correcting, adding - before new content is introduced in the lesson. Response time is protected, not squeezed.","Response time before new content; protected; students act on feedback; not squeezed","New content starts immediately; no response time; feedback not acted on; wasted","Response time format adapted for SEND learners - correcting one element rather than rewriting"],["D4.P04.S02.2.2",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Student Feedback Response Time","Response Task Design","The feedback response task is specific - students know exactly what to do, for how long, and what success looks like. Not 'improve your work' but 'correct this specific element using the model.',","Specific response task; what, how long, what success; not vague 'improve your work'","Vague improvement task; students unclear; open-ended; quality uncertain","Response task designed to be achievable in the time - SEND learners given adapted scope"],["D4.P04.S02.2.3",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Student Feedback Response Time","Response Quality Check","Teacher checks the quality of feedback responses - that students have improved, not just added something. Quality threshold applied.","Response quality checked; improvement verified; threshold applied; not just presence of addition","Addition checked not quality; students add without improving; quality not verified","Response quality check includes individual check for SEND learners where whole-class check may not reflect their response"],["D4.P04.S03.3.1",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Verbal and In-Practice Feedback","In-Practice Verbal Feedback","Feedback during practice is immediate, quiet, specific, and action-orientated. One point. Delivered and move on.","Immediate; quiet; specific; one point; action-orientated; move on","Deferred; loud; vague; multiple points; teacher stays after feedback","Verbal feedback tone is consistent - calm and developmental regardless of frequency of correction"],["D4.P04.S03.3.2",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Verbal and In-Practice Feedback","Feedback Tracking","Teacher tracks whether verbal feedback has been acted on - noting which learners have received feedback and whether their work shows change. Brief tracking, not paperwork.","Brief tracking; change evidenced; feedback acted on; not only given","Feedback given but not tracked; no evidence of impact; tracking absent","Feedback tracking includes SEND learners - individual response tracked against their specific targets"],["D4.P04.S03.3.3",4,"Practice that sticks","Deliberate Practice Architecture","Feedback Response Cycle","Verbal and In-Practice Feedback","Self-Feedback Prompts","Prompts available for students to give themselves feedback before teacher sees the work: 'Have I included...? Does this make sense? What would make this better?' Metacognitive tool.","Self-feedback prompts available; used before teacher feedback; metacognitive; visible","No self-feedback; students wait for teacher; metacognitive opportunity absent","Self-feedback prompts adapted - simplified, visual, or in first language for EAL learners"],["D4.P05.S01.1.1",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Weekly Review Structure","Weekly Review Design","Weekly review planned into the scheme of work - not improvised. Reviews content from the previous 3-4 weeks using varied retrieval formats.","Weekly review in scheme of work; planned; varied format; 3-4 week content range","Weekly review improvised; absent; same format; or only last week's content","Weekly review format adapted for accessibility - not only written retrieval"],["D4.P05.S01.1.2",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Weekly Review Structure","Weekly Review Timing","Weekly review has a consistent, protected slot - not squeezed or skipped when content pressure increases. Review is part of the teaching commitment, not additional.","Consistent timing; protected; not skipped when content pressure grows","Review skipped when behind; inconsistent timing; treated as optional extra","Protected review time signals that retention is as important as coverage - important message for all learners"],["D4.P05.S01.1.3",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Weekly Review Structure","Weekly Review Content Selection","Content selected for weekly review is chosen strategically - the most important concepts, the most commonly forgotten material, the prerequisites for upcoming content.","Strategic selection; most important content; connected to upcoming learning","Random selection; least important content; not connected to upcoming learning","Content selection considers SEND learners' specific retrieval challenges - areas where consolidation is most needed"],["D4.P05.S02.2.1",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Monthly Review Design","Monthly Review Planning","Monthly review planned in the scheme of work at the start of the unit or term - not added retrospectively. Identifies which content will be reviewed at the 1-month mark.","Monthly review planned in scheme; 1-month mark identified; content scheduled","Monthly review absent; not planned; improvised if it occurs at all","Monthly review planning includes SEND learner-specific content priorities"],["D4.P05.S02.2.2",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Monthly Review Design","Monthly Review Depth","Monthly review goes deeper than weekly review - asking students to apply, explain, or connect content rather than just recall. Harder retrieval, longer interval.","Deeper retrieval at monthly review; apply/explain/connect; not just recall; harder than weekly","Monthly review identical to weekly; same format; same depth; no progression in demand","Monthly review depth adapted - SEND learners may need supported application before unsupported"],["D4.P05.S02.2.3",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Monthly Review Design","Monthly Review Feed-Forward","Monthly review outcomes inform the next planning cycle - what content needs further retrieval, what has been successfully consolidated, what can be retired.","Monthly review outcomes inform next planning; consolidated content noted; feed-forward explicit","Monthly review completed but outcomes not used; no feed-forward; each cycle independent","SEND learner monthly review outcomes shared with SENCO - longitudinal view of consolidation"],["D4.P05.S03.3.1",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Curriculum Review Calendar","Annual Review Calendar","At the planning stage, a review calendar is embedded in the scheme of work - identifying when major content areas will be retrieved throughout the year.","Review calendar in scheme of work; annual view; content reviewed across year","No review calendar; retrieval improvised; no systematic plan","Annual review calendar shared with all teachers of the same learner - cross-subject consistency"],["D4.P05.S03.3.2",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Curriculum Review Calendar","Review-Coverage Balance","Scheme of work balances coverage of new content with systematic review of prior content. Review is not an add-on - it is planned into the coverage timeline.","Review and coverage balanced in scheme; neither dominates; planned proportion","Coverage dominates; review absent from scheme; coverage seen as primary purpose","Review-coverage balance considers SEND learners' need for higher proportion of review time"],["D4.P05.S03.3.3",4,"Practice that sticks","Deliberate Practice Architecture","Weekly and Monthly Review Systems","Curriculum Review Calendar","Review System Continuity","Review system continues across year groups - content reviewed in Year X is re-retrieved in Year X+1 where relevant. Continuity is planned across the curriculum team.","Cross-year continuity planned; content retrieved across year groups; curriculum team coordinated","Review only within a year; cross-year continuity absent; teams work in isolation","Cross-year continuity is a curriculum leadership responsibility - not individual teacher planning"],["D4.P06.S01.1.1",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Micro-Rehearsal Design","Single Behaviour Focus","Each micro-rehearsal session focuses on one implementation behaviour only. Not two. Not a composite. One specific, named, observable behaviour.","One behaviour; named; specific; observable; not composite","Multiple behaviours rehearsed simultaneously; too broad; unclear focus","Single behaviour focus is the implementation of the 'one manageable next step' principle"],["D4.P06.S01.1.2",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Micro-Rehearsal Design","5-12 Minute Duration","Rehearsal lasts 5-12 minutes - not 45 minutes. Session ends when fluency is reached, not when time runs out. Duration is calibrated to the behaviour, not to the schedule.","5-12 minutes; fluency-end not time-end; calibrated to behaviour","Session too long; time-driven not fluency-driven; 45-minute roleplay format","Micro-rehearsal duration is the deliberate practice principle applied to professional development"],["D4.P06.S01.1.3",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Micro-Rehearsal Design","Peer or Coach Involvement","Rehearsal involves another person - a peer or a coach. Not solo rehearsal. Feedback is available. The experience mirrors the two-person nature of classroom teaching.","Another person involved; feedback available; peer or coach; not solo","Solo rehearsal; no feedback; no other person; mirror-practice only","Peer involvement normalises rehearsal culture - modelled by coaching lead to reduce vulnerability"],["D4.P06.S02.2.1",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Rehearsal Sequence and Fluency","Sequence Fidelity","Rehearsal sequence always: Model → Notice → Rehearse → Feedback → Repeat → Contextualise. Steps are not skipped. Coach models before teacher rehearses.","All six steps followed in sequence; not skipped; coach models first","Sequence skipped; teacher rehearses without seeing model; feedback at end not during","Sequence fidelity is a coaching discipline - coaching lead monitors"],["D4.P06.S02.2.2",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Rehearsal Sequence and Fluency","Fluency Standard Identification","Before rehearsal begins, coach names what fluency looks like for this specific behaviour. Rehearsal continues until the standard is reached.","Fluency threshold named before rehearsal; rehearsal ends at threshold; specific not vague","No fluency threshold; rehearsal ends at time; threshold vague; pass/fail not named","Fluency threshold documentation is the quality assurance mechanism for rehearsal sessions"],["D4.P06.S02.2.3",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Rehearsal Sequence and Fluency","Rehearsal Before Observation","No implementation behaviour is formally observed before it has been rehearsed. Rehearsal precedes observation. This is non-negotiable.","Rehearsal record precedes observation; observation timing sequenced after rehearsal","Observation before rehearsal; teacher unsure what the behaviour should look like; performance anxiety","Rehearsal-before-observation is a cultural norm - modelled by coaching lead and protected by leadership"],["D4.P06.S03.3.1",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Contextualisation and Transfer","Contextualisation Step","After fluency is reached, teacher names how they will adapt the behaviour for their specific class, year group, and learner profile. A dedicated step - not assumed.","Contextualisation is a named step; teacher specifies adaptations; class-specific language","Contextualisation absent; generic implementation assumed; adaptation not named","Contextualisation includes SEND and EAL adaptations - specific not generic"],["D4.P06.S03.3.2",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Contextualisation and Transfer","Implementation Planning","Teacher plans the first time they will implement the behaviour in their next lesson. Specific lesson, specific moment, specific class. Not 'I'll use this when relevant.'","Implementation planned to specific lesson and moment; named; not vague","Implementation vague; 'when relevant'; no specific plan; teacher unsure when they will try","Implementation planning is the bridge between rehearsal and observation - critical step"],["D4.P06.S03.3.3",4,"Practice that sticks","Deliberate Practice Architecture","Teacher Implementation Rehearsal","Contextualisation and Transfer","First Implementation Review","After first classroom implementation, teacher and coach briefly debrief - what happened, what was different from rehearsal, what to try next. Not a full coaching cycle - a brief reflective conversation.","Brief debrief after first implementation; what happened; what was different; what next","No first implementation review; jump straight to full coaching cycle; first experience not processed","First implementation review normalises the gap between rehearsal and real-world - reduces teacher perfectionism"]];
var MK=0,MD=1,MTL=2,MDN=3,MPH=4,MSS=5,MNM=6,MBH=7,MLF=8,MFS=9,MSE=10;
var mvIndex={}; MOVES.forEach(function(m,i){mvIndex[m[MK]]=i;});
var pick={teacher:null,sel:null,q:"",area:"all"};

function moveByKey(k){var i=mvIndex[k];return i===undefined?null:MOVES[i];}

/* the next microstep in architecture order */
function nextInSequence(key){
  var i=mvIndex[key];
  if(i===undefined||i+1>=MOVES.length) return null;
  return MOVES[i+1];
}
/* the obvious gap: lowest-scoring area, first microstep the teacher has not met.
   In the pilot this is fed by the 360 and the look-in. Here it reads the
   teacher's weakest area from their own record. */
/* What the look-in surfaced. In the pilot this comes from the coach's own
   observation and the 360. A flag outranks sequence, because a plain problem in
   front of you beats a tidy order on paper. */
function flaggedMove(name){
  var f=CYCLE[name].flag; if(!f) return null;
  var m=moveByKey(f.key); return m?{m:m,why:f.why}:null;
}

/* SEQUENS offers at most three candidates, each with its reason stated.
   It never offers a menu of 277 as if they were interchangeable. */
function candidates(name){
  var r=CYCLE[name], out=[];
  var embedded=r.reps>=r.gate;
  var fl=flaggedMove(name);
  var seq=nextInSequence(r.key);

  if(fl) out.push({m:fl.m,cls:" gap",why:"What the look-in surfaced",rz:fl.why,rec:true});

  if(!embedded){
    out.push({hold:true,cls:" hold",why:"Recommended: stay where you are",
      name:"Keep going with \u201C"+r.msName+"\u201D",
      bh:"Not embedded yet. " + r.reps + " of " + r.gate + " rehearsals.",
      rz:"Changing move now resets the count to zero and the habit does not form. The strongest thing you can do this fortnight is nothing new.",
      rec:!fl});
  }
  if(seq) out.push({m:seq,cls:"",why:embedded?"Recommended: next in sequence":"Next in sequence, later",
    rz:embedded
      ? "\u201C"+r.msName+"\u201D is embedded at "+r.reps+" of "+r.gate+". The architecture puts this step next because it assumes the one before it."
      : "This is what follows once the current move is embedded. Not yet.",
    rec:embedded&&!fl, dim:!embedded});
  return out;
}

function openPicker(name){
  pick.teacher=name; pick.sel=null; pick.q=""; pick.area="all";
  document.getElementById("pkOvl").classList.add("on");
  document.body.style.overflow="hidden";
  renderPicker();
}
function closePicker(){
  document.getElementById("pkOvl").classList.remove("on");
  document.body.style.overflow="";
}

function pkList(){
  var out=MOVES;
  if(pick.area!=="all") out=out.filter(function(m){return m[MD]===parseInt(pick.area,10);});
  if(pick.q.length>1){
    var q=pick.q.toLowerCase();
    out=out.filter(function(m){return (m[MNM]+" "+m[MBH]).toLowerCase().indexOf(q)>-1;});
  }
  return out.slice(0,120);
}

function renderPicker(){
  var name=pick.teacher; if(!name) return;
  var r=CYCLE[name];
  var embedded = r.reps>=r.gate;
  var cands=candidates(name);

  document.getElementById("pkTitle").textContent="Choose the next move for "+name.split(" ")[0];
  document.getElementById("pkSub").textContent=
    "Currently on \u201C"+r.msName+"\u201D, "+r.reps+" of "+r.gate+" rehearsals. "+
    (embedded?"Embedded, so the circle opens.":"Not embedded yet.");

  document.getElementById("pkSugg").innerHTML=cands.map(function(c){
    var nm=c.hold?c.name:c.m[MNM], bh=c.hold?c.bh:c.m[MBH];
    var attrs=c.hold?'data-hold="1"':'data-mv="'+c.m[MK]+'"';
    var pressed=(!c.hold&&pick.sel&&pick.sel[MK]===c.m[MK]);
    return '<button class="sug'+c.cls+'" aria-pressed="'+pressed+'" '+attrs+
      (c.dim?' style="opacity:.66"':'')+'>'+
      '<span class="why">'+c.why+(c.rec?' \u2605':'')+'</span>'+
      '<span class="nm">'+nm+'</span>'+
      '<span class="bh">'+bh+'</span>'+
      '<span class="rz">'+c.rz+'</span></button>';
  }).join("");

  var list=pkList();
  document.getElementById("pkCount").textContent=list.length+(list.length===120?"+ shown":" moves");
  document.getElementById("pkList").innerHTML = list.length? list.map(function(m){
    return '<button class="pk-row" aria-pressed="'+(pick.sel&&pick.sel[MK]===m[MK])+'" data-mv="'+m[MK]+'">'+
      '<span class="n">'+m[MNM]+'</span>'+
      '<span class="t">'+m[MTL]+' \u00b7 '+m[MPH]+' \u00b7 '+m[MSS]+'</span>'+
      '<span class="b">'+m[MBH]+'</span></button>';
  }).join("") : '<div class="pk-empty">Nothing matches that. Try a different word.</div>';

  var c=document.getElementById("pkConf");
  if(!pick.sel){ c.innerHTML='<div class="pk-empty">No move chosen. '+name.split(" ")[0]+' will only ever see the one you confirm.</div>'; return; }
  var m=pick.sel;
  c.innerHTML=
    '<h4>'+m[MNM]+'</h4>'+
    '<p class="cl">'+m[MTL]+' \u00b7 '+m[MDN]+' \u00b7 '+m[MPH]+' \u00b7 '+m[MSS]+'</p>'+
    '<div class="pk-facets">'+
      '<div class="pk-facet look"><div class="k">What you should see</div><div class="v">'+m[MLF]+'</div></div>'+
      '<div class="pk-facet fail"><div class="k">When it is not landing</div><div class="v">'+m[MFS]+'</div></div>'+
      '<div class="pk-facet send"><div class="k">Reaching every learner</div><div class="v">'+m[MSE]+'</div></div>'+
    '</div>'+
    '<div class="field"><label>The shared record <span class="tag shared">'+name.split(" ")[0]+' sees this</span></label>'+
      '<textarea id="pkAgreed" placeholder="In their words, the way they will say it back to you.">'+m[MBH]+'</textarea></div>'+
    '<div style="margin-top:.7rem;"><button class="pick-btn" id="pkConfirm">Confirm this move</button> '+
    '<button class="pick-btn inline" id="pkCancel">Cancel</button></div>';
}

document.addEventListener("click",function(e){
  var t=e.target.closest("button"); if(!t) return;
  if(t.dataset.pickfor){ openPicker(t.dataset.pickfor); return; }
  if(t.id==="pkClose"||t.id==="pkCancel"){ closePicker(); return; }
  if(t.dataset.hold){ closePicker(); return; }
  if(t.dataset.mv){ pick.sel=moveByKey(t.dataset.mv); renderPicker();
    document.getElementById("pkConf").scrollIntoView&&document.getElementById("pkConf").scrollIntoView({behavior:"smooth",block:"nearest"}); return; }
  if(t.id==="pkConfirm"){
    var name=pick.teacher, m=pick.sel, r=CYCLE[name];
    var txt=(document.getElementById("pkAgreed")||{}).value||m[MBH];
    r.key=m[MK]; r.msName=m[MNM]; r.move=txt; r.lookFor=m[MLF];
    r.trail=m[MTL]+" \u00b7 "+m[MDN]+" \u00b7 "+m[MPH]+" \u00b7 "+m[MSS];
    r.agreed=txt; r.reps=0;
    var nx=nextInSequence(m[MK]);
    r.next = nx ? nx[MNM]+". "+nx[MBH] : "Agree the next step together.";
    closePicker(); rerender();
    return;
  }
});
document.addEventListener("click",function(e){ if(e.target.id==="pkOvl") closePicker(); });
document.addEventListener("keydown",function(e){ if(e.key==="Escape") closePicker(); });


/* picker controls */
document.addEventListener("input",function(e){
  if(e.target.id==="pkQ"){ pick.q=e.target.value.trim(); renderPicker(); }
});
document.addEventListener("change",function(e){
  if(e.target.id==="pkArea"){ pick.area=e.target.value; renderPicker(); }
  /* the school's coaching day, changed live from the admin console */
  if(e.target.id==="coachDay"){ SCHOOL.coachingDay=e.target.value; rerender(); }
  if(e.target.id==="coachPart"){ SCHOOL.windowPart=e.target.value; rerender(); }
});

</script>

<div class="ovl" id="pkOvl" role="dialog" aria-modal="true" aria-labelledby="pkTitle">
  <div class="modal">
    <div class="modal-h">
      <div><h3 id="pkTitle">Choose the next move</h3></div>
      <button class="x" id="pkClose">Close</button>
      <div class="mh-sub" id="pkSub"></div>
    </div>
    <div class="modal-b">
      <div class="sugg" id="pkSugg"></div>
      <div class="pk-tools">
        <input id="pkQ" type="search" placeholder="Search all 277 classroom moves" aria-label="Search moves">
        <select id="pkArea">
          <option value="all">All four areas</option>
          <option value="1">Coming in and routines</option>
          <option value="2">Showing them how</option>
          <option value="3">Reaching every learner</option>
          <option value="4">Practice that sticks</option>
        </select>
        <span class="pk-count" id="pkCount"></span>
      </div>
      <div class="pk-list" id="pkList"></div>
      <div class="pk-conf" id="pkConf"></div>
    </div>
  </div>
</div>
</body>
</html>
