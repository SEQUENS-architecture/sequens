<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEQUENS - coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700;800&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F7F9; --paper-2:#E9F1F5; --surface:#F8FBFC; --card:#FFFFFF;
    --ink:#0A3D62; --ink-soft:#3D5A6E; --muted:#5B7A90;
    --terra:#0C8F79; --terra-deep:#0A7563; --terra-soft:#BFE5DC;
    --teal:#2C6E9B; --teal-soft:#D8E8F1; --teal-deep:#1F4F73;
    --gold:#B8912F; --gold-soft:#F3ECD2; --gold-deep:#7A6118;
    --green:#3F8F6B; --green-soft:#D8EEE2; --green-deep:#2C6B4F;
    --rule:#D7E4EA; --rule-2:#C2D6DF;
    --display:'Schibsted Grotesk','Segoe UI',Arial,sans-serif;
    --body:'Lexend','Segoe UI',system-ui,sans-serif;
    --shadow:0 2px 16px rgba(10,61,98,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4,.eyebrow,.btn,.pill,.brand,.stat .v,.role-seg button,.freetag,.rag,.when{font-family:var(--display);}
  h3{font-size:1.12rem;font-weight:600;margin:0 0 .15rem;}
  .mono{font-family:var(--display);font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-deep);}
  .sub{font-size:.9rem;color:var(--ink-soft);margin:0 0 1rem;}
  .btn{display:inline-block;background:var(--terra);color:#fff;border:none;border-radius:11px;padding:.6rem 1.1rem;font-size:.92rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s;}
  .btn:hover{background:var(--terra-deep);}
  .btn.ghost{background:transparent;color:var(--terra);border:1.5px solid var(--terra-soft);}
  .btn.ghost:hover{border-color:var(--terra);background:transparent;}
  .btn.teal{background:var(--teal);} .btn.teal:hover{background:var(--teal-deep);}
  :focus-visible{outline:2.5px solid var(--terra);outline-offset:2px;border-radius:6px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}

  /* ---------- login ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  .login-card{background:var(--card);border:1px solid var(--rule);border-radius:22px;box-shadow:var(--shadow);max-width:440px;width:100%;padding:2.6rem 2.2rem;text-align:center;}
  .login-card .brand{font-size:1.5rem;font-weight:700;letter-spacing:.02em;color:var(--ink);display:inline-flex;align-items:center;gap:.5rem;margin-bottom:.3rem;}
  .login-card .brand .dot{width:13px;height:13px;border-radius:50%;background:var(--terra);}
  .login-card h1{font-size:1.35rem;font-weight:600;margin:1.3rem 0 .3rem;}
  .login-card .sub{margin-bottom:1.6rem;}
  .role-grid{display:grid;gap:.7rem;}
  .role-btn{display:flex;align-items:center;gap:.9rem;text-align:left;background:var(--surface);border:1.5px solid var(--rule);border-radius:14px;padding:.95rem 1.1rem;cursor:pointer;transition:all .15s;font-family:var(--body);width:100%;}
  .role-btn:hover{border-color:var(--teal);background:#fff;transform:translateY(-1px);}
  .role-btn .ic{width:40px;height:40px;border-radius:11px;background:var(--teal-soft);color:var(--teal-deep);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;flex-shrink:0;}
  .role-btn .rt{font-family:var(--display);font-weight:600;color:var(--ink);font-size:1rem;}
  .role-btn .rd{font-size:.82rem;color:var(--muted);}

  /* ---------- app shell ---------- */
  #app{display:none;}
  .topbar{background:var(--card);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:20;}
  .topbar-in{max-width:1080px;margin:0 auto;padding:.75rem 1.3rem;display:flex;align-items:center;gap:1rem;}
  .brand{font-weight:700;font-size:1.15rem;letter-spacing:.02em;color:var(--ink);display:inline-flex;align-items:center;gap:.45rem;text-decoration:none;}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--terra);}
  .role-seg{display:flex;gap:.25rem;background:var(--paper-2);border-radius:12px;padding:.25rem;margin-left:auto;flex-wrap:wrap;}
  .role-seg button{border:none;background:transparent;color:var(--ink-soft);font-size:.8rem;font-weight:600;padding:.4rem .7rem;border-radius:9px;cursor:pointer;transition:all .15s;}
  .role-seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(58,46,38,.1);}
  .who{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--ink-soft);}
  .who .logout{color:var(--muted);cursor:pointer;text-decoration:underline;font-size:.8rem;}
  .page{max-width:1080px;margin:0 auto;padding:1.6rem 1.3rem 3.5rem;}
  .dash-top{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.4rem;flex-wrap:wrap;}
  .dash-top h1{font-size:1.7rem;font-weight:600;margin:.15rem 0 0;}
  .role-pill{font-family:var(--display);font-size:.72rem;font-weight:600;letter-spacing:.04em;background:var(--teal-soft);color:var(--teal-deep);padding:.4rem .8rem;border-radius:20px;white-space:nowrap;}

  /* ---------- primitives ---------- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.3rem;}
  @media (max-width:820px){.grid2{grid-template-columns:1fr;}}
  .panel{background:var(--card);border:1px solid var(--rule);border-radius:16px;box-shadow:var(--shadow);padding:1.3rem 1.4rem;margin-bottom:1.3rem;}
  .focus-card{background:var(--gold-soft);border:1px solid #CBE0D8;border-radius:16px;padding:1.4rem;}
  .focus-card .mono{color:var(--gold-deep);}
  .focus-card h3{margin-top:.2rem;}
  .focus-card p{margin:.3rem 0 0;color:var(--ink-soft);font-size:.95rem;}
  .banner{background:var(--teal-soft);border-radius:12px;padding:.8rem 1rem;font-size:.9rem;color:#184f4c;margin-bottom:1.2rem;}
  .banner b{font-weight:700;}
  .note{font-size:.82rem;color:var(--muted);font-style:italic;}

  .bars2{display:flex;flex-direction:column;gap:.7rem;margin-top:.6rem;}
  .bar-c .bl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.2rem;}
  .bar-c .pname{font-size:.9rem;color:var(--ink);font-weight:600;}
  .bar-c .pname small{font-weight:400;color:var(--muted);font-size:.74rem;font-style:italic;}
  .bar-c .pscore{font-family:var(--display);font-size:.82rem;color:var(--ink-soft);}
  .track{height:8px;background:var(--paper-2);border-radius:6px;overflow:hidden;}
  .track .v{height:100%;background:var(--teal);border-radius:6px;}
  .track .v.low{background:var(--gold);}

  .next-row{display:flex;gap:.9rem;padding:.6rem 0;border-bottom:1px solid var(--rule);}
  .next-row:last-child{border-bottom:none;}
  .next-row .when{color:var(--teal-deep);font-size:.78rem;font-weight:600;min-width:52px;padding-top:.1rem;text-transform:uppercase;letter-spacing:.04em;}
  .next-row div{font-size:.93rem;}

  .jrow{display:flex;gap:.7rem;padding:.5rem 0;align-items:flex-start;}
  .jdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:.28rem;}
  .jdot.now{background:var(--terra);} .jdot.next{background:transparent;border:2px solid var(--rule-2);}

  .freetag{font-size:.56rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-deep);background:var(--teal-soft);padding:.24rem .55rem;border-radius:20px;vertical-align:middle;margin-left:.4rem;}

  .statstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.3rem;}
  .st{background:var(--card);border:1px solid var(--rule);border-radius:14px;padding:.9rem 1rem;box-shadow:var(--shadow);}
  .st .v{font-size:1.7rem;font-weight:700;line-height:1;color:var(--ink);}
  .st .l{font-size:.78rem;color:var(--ink-soft);margin-top:.25rem;}
  .st.due .v{color:var(--terra);}
  .st.good .v{color:var(--green-deep);}

  /* coach teacher cards */
  .cteach{background:var(--surface);border:1px solid var(--rule);border-radius:13px;padding:1rem 1.1rem;margin-bottom:.75rem;}
  .ct-head{display:flex;align-items:center;gap:.75rem;margin-bottom:.55rem;}
  .av{width:34px;height:34px;border-radius:50%;background:var(--teal-soft);color:var(--teal-deep);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:.85rem;flex-shrink:0;}
  .ct-head .nm{font-weight:700;font-size:.98rem;}
  .pbadge{font-size:.76rem;color:var(--muted);}
  .pbadge small{font-style:italic;}
  .status{margin-left:auto;font-family:var(--display);font-size:.64rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:.3rem .6rem;border-radius:14px;background:var(--teal-soft);color:var(--teal-deep);white-space:nowrap;}
  .status.due{background:var(--terra-soft);color:var(--terra-deep);}
  .ct-line{font-size:.9rem;color:var(--ink-soft);padding:.15rem 0;}
  .ct-line .ml{font-family:var(--display);font-size:.66rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:.5rem;}
  details{margin-top:.6rem;border-top:1px solid var(--rule);padding-top:.5rem;}
  summary{font-family:var(--display);font-size:.82rem;font-weight:600;color:var(--teal-deep);cursor:pointer;list-style:none;}
  summary::-webkit-details-marker{display:none;}
  summary::before{content:"▸ ";}
  details[open] summary::before{content:"▾ ";}
  .guide{margin-top:.7rem;display:flex;flex-direction:column;gap:.7rem;}
  .gblk .gh{font-family:var(--display);font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;}
  .gblk p{margin:0;font-size:.9rem;color:var(--ink-soft);}
  .gblk ul{margin:.2rem 0 0;padding-left:1.1rem;}
  .gblk li{font-size:.9rem;color:var(--ink-soft);margin-bottom:.2rem;}

  /* coach/team rows */
  .coachrow{display:flex;align-items:center;gap:.85rem;padding:.8rem 0;border-bottom:1px solid var(--rule);}
  .coachrow:last-child{border-bottom:none;}
  .coachrow .cinfo{flex:1;min-width:0;}
  .coachrow .cn{font-weight:700;font-size:.96rem;}
  .coachrow .cmeta{font-size:.84rem;color:var(--ink-soft);}
  .coachrow .cmeta b{color:var(--ink);font-weight:600;}
  .cstat{font-family:var(--display);font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.3rem .6rem;border-radius:16px;white-space:nowrap;flex-shrink:0;}
  .cstat.ok{background:var(--green-soft);color:var(--green-deep);}
  .cstat.nudge{background:var(--gold-soft);color:var(--gold-deep);}
  .cstat.support{background:var(--terra-soft);color:var(--terra-deep);}

  /* success criteria */
  .crit{display:flex;align-items:center;gap:.8rem;padding:.7rem 0;border-bottom:1px solid var(--rule);}
  .crit:last-child{border-bottom:none;}
  .crit .cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .cdot.g{background:var(--green);} .cdot.a{background:var(--gold);} .cdot.r{background:var(--terra);}
  .crit .ctext{flex:1;font-size:.92rem;}
  .crit .cval{font-family:var(--display);font-weight:700;font-size:.95rem;color:var(--ink);white-space:nowrap;}

  .maprow{display:flex;gap:1rem;padding:.7rem 0;border-bottom:1px solid var(--rule);}
  .maprow:last-child{border-bottom:none;}
  .maprow .mk{font-family:var(--display);font-weight:600;font-size:.9rem;color:var(--teal-deep);min-width:120px;}
  .maprow .mv{font-size:.9rem;color:var(--ink-soft);}

  .chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
  .chip{font-size:.78rem;background:var(--paper-2);color:var(--ink-soft);border-radius:16px;padding:.3rem .7rem;}

  /* deliberate practice ticker */
  .dp{background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:.9rem 1rem;margin:.8rem 0;}
  .dp-lbl{font-family:var(--display);font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-deep);}
  .pips{display:flex;gap:.4rem;align-items:center;}
  .pip{width:20px;height:20px;border-radius:50%;border:2px solid var(--rule-2);background:transparent;transition:all .15s;}
  .pip.on{background:var(--teal);border-color:var(--teal);}
  .pip.done{background:var(--green);border-color:var(--green);}
  .dp-count{font-size:.86rem;color:var(--ink-soft);margin-top:.55rem;}
  .dp-count b{color:var(--ink);font-family:var(--display);}
  .logbtn{margin-top:.7rem;font-size:.85rem;padding:.46rem .9rem;}

  /* note & record fields */
  .field{margin-top:.85rem;}
  .field label{display:flex;align-items:center;font-family:var(--display);font-size:.64rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:.28rem;}
  .field textarea{width:100%;border:1px solid var(--rule-2);border-radius:10px;padding:.6rem .7rem;font-family:var(--body);font-size:.9rem;color:var(--ink);background:var(--card);resize:vertical;min-height:50px;line-height:1.45;}
  .field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-soft);}
  .field.private textarea{background:#F3F8FA;border-color:var(--terra-soft);}
  .tag{font-family:var(--display);font-size:.56rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.2rem .5rem;border-radius:12px;margin-left:.5rem;}
  .tag.priv{color:var(--terra-deep);background:var(--terra-soft);}
  .tag.shared{color:var(--teal-deep);background:var(--teal-soft);}
  .saved{font-size:.8rem;color:var(--green-deep);font-weight:600;margin-left:.6rem;opacity:0;transition:opacity .2s;}
  .saved.show{opacity:1;}
  .readrow{padding:.6rem 0;border-bottom:1px solid var(--rule);}
  .readrow:last-child{border-bottom:none;}
  .readrow .rk{font-family:var(--display);font-size:.64rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
  .readrow .rv{font-size:.94rem;color:var(--ink);margin-top:.12rem;}
  /* logo mark */
  .logo-mark{height:22px;width:auto;vertical-align:-5px;margin-right:3px;}
  .login-card .logo-mark{height:30px;vertical-align:-7px;}
  /* admin console */
  .field input, .field select{width:100%;border:1px solid var(--rule-2);border-radius:10px;padding:.55rem .7rem;font-family:var(--body);font-size:.92rem;color:var(--ink);background:var(--card);}
  .field input:focus, .field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-soft);}
  textarea.csv{width:100%;min-height:88px;border:1px solid var(--rule-2);border-radius:10px;padding:.6rem .7rem;font-family:ui-monospace,monospace;font-size:.82rem;color:var(--ink);background:var(--card);resize:vertical;}
  table.people{width:100%;border-collapse:collapse;margin-top:.5rem;font-size:.9rem;}
  table.people th{text-align:left;font-family:var(--display);font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:.4rem .5rem;border-bottom:1px solid var(--rule-2);}
  table.people td{padding:.5rem .5rem;border-bottom:1px solid var(--rule);vertical-align:middle;}
  table.people td.nm{font-weight:600;color:var(--ink);}
  table.people td.em{color:var(--ink-soft);font-size:.82rem;}
  table.people select{border:1px solid var(--rule-2);border-radius:8px;padding:.3rem .45rem;font-family:var(--body);font-size:.84rem;background:var(--card);color:var(--ink);}
  .pstat{font-family:var(--display);font-size:.56rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.24rem .55rem;border-radius:14px;}
  .pstat.active{background:var(--green-soft);color:var(--green-deep);}
  .pstat.invited{background:var(--gold-soft);color:var(--gold-deep);}
  .minibtn{font-family:var(--display);font-size:.72rem;font-weight:600;color:var(--terra);background:none;border:1px solid var(--terra-soft);border-radius:8px;padding:.3rem .6rem;cursor:pointer;}
  .minibtn:hover{background:var(--terra);color:#fff;border-color:var(--terra);}
  .assignrow{display:flex;align-items:center;gap:.8rem;padding:.55rem 0;border-bottom:1px solid var(--rule);}
  .assignrow:last-child{border-bottom:none;}
  .assignrow .an{flex:1;font-size:.92rem;font-weight:600;color:var(--ink);}
  .assignrow select{border:1px solid var(--rule-2);border-radius:8px;padding:.35rem .55rem;font-family:var(--body);font-size:.85rem;background:var(--card);color:var(--ink);}
  .capline{font-size:.82rem;color:var(--ink-soft);margin-top:.2rem;}
  .capline b{font-family:var(--display);color:var(--ink);}
  .capline .over{color:var(--terra-deep);font-weight:700;}

  /* ---------- alignment system ----------
     Every column is a flex stack with one gap value, so panels line up across
     columns and no panel carries its own margin. */
  .grid > *, .grid2 > *{display:flex;flex-direction:column;gap:1.3rem;min-width:0;}
  .grid > * > .panel, .grid2 > * > .panel,
  .grid > * > .focus-card, .grid2 > * > .focus-card{margin:0;}
  .panel{margin:0;}
  .grid, .grid2{align-items:stretch;}

  /* panels stretch to fill their column so column bottoms agree */
  .grid > * > .panel:last-child, .grid2 > * > .panel:last-child{flex:1;}

  /* ---------- breakpoints ----------
     One breakpoint was doing all the work. Three do it properly. */
  @media (max-width:1000px){
    .grid, .grid2{grid-template-columns:1fr;}
    .grid > *, .grid2 > *{gap:1.1rem;}
  }
  @media (max-width:620px){
    .page{padding:1.1rem .9rem 3rem;}
    .statstrip{grid-template-columns:1fr;gap:.6rem;}
    .dash-top{align-items:flex-start;}
    .dash-top h1{font-size:1.4rem;}
  }
  @media (max-width:400px){
    .page{padding:1rem .75rem 2.6rem;}
    .topbar-in{flex-wrap:wrap;row-gap:.5rem;}
  }

  /* ---------- THE MOVE ----------
     The one thing a teacher must not be able to miss. It is the product. */
  .movecard{background:var(--card);border:1px solid var(--rule);border-left:5px solid var(--terra);
    border-radius:16px;box-shadow:var(--shadow);padding:1.5rem 1.6rem;margin-bottom:1.3rem;}
  .movecard .mc-top{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap;margin-bottom:.5rem;}
  .movecard .mc-lbl{font-family:var(--display);font-size:.66rem;font-weight:700;letter-spacing:.13em;
    text-transform:uppercase;color:var(--terra-deep);}
  .movecard .mc-cycle{font-size:.72rem;color:var(--muted);}
  .movecard .mc-move{font-family:var(--display);font-weight:700;color:var(--ink);
    font-size:clamp(1.35rem,3.1vw,1.95rem);line-height:1.22;letter-spacing:-.015em;margin:0 0 .6rem;max-width:26ch;}
  .movecard .mc-trail{font-size:.78rem;color:var(--muted);margin:0 0 1rem;}
  .movecard .mc-sub{font-size:.92rem;color:var(--ink-soft);max-width:60ch;margin:0 0 1.1rem;}
  .movecard .mc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.8rem;}
  .movecard .mc-cell{background:var(--surface);border-radius:11px;padding:.85rem 1rem;}
  .movecard .mc-cell .k{font-family:var(--display);font-size:.62rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--muted);margin-bottom:.28rem;}
  .movecard .mc-cell .v{font-size:.9rem;color:var(--ink);line-height:1.5;}
  .movecard .mc-cell.look{background:var(--green-soft);} .movecard .mc-cell.look .k{color:var(--green-deep);}
  .movecard .mc-cell.look .v{color:#28513F;}
  @media (max-width:520px){.movecard{padding:1.2rem 1.1rem;}}


  /* ---------- move picker ---------- */
  /* same family as .btn: display face, same radius, same metrics */
  .pick-btn{display:inline-block;background:var(--terra);color:#fff;border:none;border-radius:11px;
    padding:.6rem 1.1rem;font-family:var(--display);font-weight:600;font-size:.9rem;
    line-height:1.2;cursor:pointer;}
  .pick-btn:hover{background:var(--terra-deep);}
  .pick-btn[disabled]{background:var(--rule-2);cursor:not-allowed;}
  /* in a teacher card the routine action is Save; choosing a move is the
     deliberate, occasional one, so it takes the quieter outline treatment
     and the two stop competing */
  .pick-btn.inline{background:transparent;color:var(--terra-deep);
    border:1.5px solid var(--terra-soft);font-size:.85rem;padding:.46rem .9rem;}
  .pick-btn.inline:hover{background:#F1FAF7;border-color:var(--terra);}
  /* the action row: one baseline, no inherited margins */
  .actionrow{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.9rem;}
  .actionrow .btn, .actionrow .pick-btn{margin-top:0;}
  .actionrow .saved{margin-left:.2rem;}
  .ovl{display:none;position:fixed;inset:0;background:rgba(10,61,98,.45);z-index:60;
    padding:1.2rem;overflow-y:auto;}
  .ovl.on{display:block;}
  .modal{background:var(--paper);border-radius:18px;max-width:960px;margin:1.2rem auto;

<script>

/* ---------- SCHOOL SETTINGS ----------

/* ============================================================
   FRIENDLY SURFACE OVER THE REAL DOMAINS
   Teachers only ever see the plain-English name (left).
   Coaches also see the real domain underneath (right).
   The 360 covers the four CLASSROOM-FACING domains only;
   the system domains live in the coach & lead-coach layers.
   ============================================================ */
const AREAS = [
  { friendly:"Coming in & routines",  domain:"Entry & Exit Routines" },
  { friendly:"Showing them how",      domain:"Explicit Modelling" },
  { friendly:"Reaching every learner",domain:"Adaptive Scaffolding" },
  { friendly:"Practice that sticks",  domain:"Deliberate Practice" }
];

const ROLES = {
  admin:     { name:"James Banfield",  label:"School admin",  ic:"A", desc:"Sets up the school & its people" },
  teacher:   { name:"Miss Sara Adel", label:"Teacher",       ic:"T", desc:"The person being coached" },
  coach:     { name:"Yusuf Demir",    label:"Coach",         ic:"C", desc:"Coaches up to six teachers" },
  lead:      { name:"Heba Mansour",   label:"Lead coach",    ic:"L", desc:"Holds the coaching team" },
  slt:       { name:"Dana Farouk",    label:"Senior leader", ic:"S", desc:"Teaching & learning lead" }
};
const ROLE_LABEL = { teacher:"Teacher", coach:"Coach", lead_coach:"Lead coach", slt:"Senior leader" };

/* ---- helpers ---- */
function bar(area, avg, showDomain){
  const pct=Math.round(avg/4*100); const low = avg<2.6 ? "low":"";
  const dom = showDomain ? ` <small>· ${area.domain}</small>`:"";
  return `<div class="bar-c"><div class="bl"><span class="pname">${area.friendly}${dom}</span><span class="pscore">${avg.toFixed(1)}</span></div><div class="track"><div class="v ${low}" style="width:${pct}%"></div></div></div>`;
}

/* ============================================================
   SHARED COACHING-CYCLE RECORDS
   The coach writes; the teacher reads the SHARED parts only.
   coachNote is PRIVATE (the wall). agreed / next / commitment are SHARED.
   Deliberate practice = rehearsals logged toward the embed gate.
   TODO: replace with real data / persist to the backend.
   ============================================================ */
const CYCLE = {
  "Sara Adel": { key:"D3.P02.S01.1.4", msName:"Scaffold Pre-Positioning",
    trail:"Reaching every learner \u00b7 Adaptive Scaffolding \u00b7 Pre-Planned Scaffold Architecture \u00b7 Scaffold Design",

    commitment:"I won\u2019t talk over noise - I\u2019ll wait for the room." }
};
const TEACHER_KEY = "Sara Adel"; // the logged-in teacher

function dpState(r){ return r.reps>=r.gate ? "done" : r.reps>=Math.ceil(r.gate/2) ? "emb" : "prac"; }
function dpLabel(s){ return s==="done"?"Embedded":s==="emb"?"Embedding":"Practising"; }

function ticker(name, editable){
  const r=CYCLE[name]; const s=dpState(r);
  let pips="";
  for(let i=0;i<r.gate;i++){ pips+=`<span class="pip ${i<r.reps?(s==='done'?'done':'on'):''}"></span>`; }
  const count = r.reps>=r.gate
    ? `<div class="dp-count" style="color:var(--green-deep);"><b>Embedded.</b> Ready to gate to the next move.</div>`
    : `<div class="dp-count">${dpLabel(s)}. <b>${r.reps} of ${r.gate}</b> rehearsals.</div>`;
  const btn = (editable && r.reps<r.gate) ? `<button class="btn teal logbtn" data-rep="${name}">+ Log a rehearsal</button>` : "";
  return `<div class="dp">
    <div class="dp-lbl">Deliberate practice</div>
    <div class="pips">${pips}</div>${count}${btn}</div>`;
}

/* ---- working interactions ---- */
const dash = document.getElementById("dash");
function rerender(){ const c=document.querySelector("#roleSeg button.on"); render(c?c.dataset.r:"admin"); }
function parseCSV(text){
  return text.split(/\n/).map(l=>l.trim()).filter(Boolean).map(l=>{
    const p=l.split(",").map(s=>(s||"").trim());
    let r=(p[2]||"teacher").toLowerCase().replace(/\s+/g,"_");
    if(!ROLE_LABEL[r]) r="teacher";
    return { name:p[0]||"(no name)", email:p[1]||"", role:r, status:"invited" };
  });
}

dash.addEventListener("click", e=>{
  const rep = e.target.closest("[data-rep]");
  if(rep){ const r=CYCLE[rep.dataset.rep]; if(r.reps<r.gate) r.reps++; rerender(); return; }

  if(e.target.closest("[data-import]")){
    const ta=document.getElementById("csv");
    if(ta && ta.value.trim()){ PEOPLE.push(...parseCSV(ta.value)); }
    rerender(); return;
  }
  if(e.target.closest("[data-sample]")){
    const ta=document.getElementById("csv");
    if(ta) ta.value="Nour Ismail, nour.ismail@elalsson.edu.eg, teacher\nOmar Farag, omar.farag@elalsson.edu.eg, teacher\nHala Adib, hala.adib@elalsson.edu.eg, coach";
    return;
  }
  const inv = e.target.closest("[data-invite]");
  if(inv){ PEOPLE[+inv.dataset.invite].status="invited"; rerender(); return; }
  if(e.target.closest("[data-invite-all]")){ PEOPLE.forEach(p=>{ if(p.status!=="active") p.status="invited"; }); rerender(); return; }

  const save = e.target.closest("[data-save]");
  if(save){ const t=save.parentElement.querySelector("[data-saved]"); if(t){ t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600);} }
});

dash.addEventListener("input", e=>{
  const f = e.target.closest("[data-field]");
  if(f){ CYCLE[f.dataset.name][f.dataset.field] = e.target.value; }
});

dash.addEventListener("change", e=>{
  const role = e.target.closest("[data-role]");
  if(role){ PEOPLE[+role.dataset.role].role = e.target.value; return; }
  const asn = e.target.closest("[data-assign]");
  if(asn){ ASSIGN[asn.dataset.assign] = e.target.value; rerender(); return; }
});

efore entry is finished.","Position maintained until full entry complete; no early departure from threshold","Teacher moves inside before all students have entered; position abandoned mid-entry","Maintaining position throughout entry provides consistency for late-arriving or anxious learners"],["D1.P01.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","Door Position Architecture","Environmental Readiness","Board Readiness","Board written, displayed, and complete before teacher takes door position. Anchor task, any key information, and visual displays ready. Teacher does not write on board during entry.","Board fully complete before first student arrives; nothing added during entry","Teacher writing on board as students arrive; board incomplete at entry","Visual schedules, now-next boards, and individualised prompts pre-positioned before entry"],["D1.P01.S02.2.2",1,"Coming in and routines","Entry & Exit Routines","Door Position Architecture","Environmental Readiness","Materials Distribution","All lesson resources, equipment, and materials distributed or accessible before entry. Students do not wait for materials after sitting.","Materials available at desks or accessible point before students arrive","Teacher distributing materials during entry or after students are seated","Pre-positioned individualised resources (worked examples, vocabulary cards) for SEND learners at their desk"],["D1.P01.S02.2.3",1,"Coming in and routines","Entry & Exit Routines","Door Position Architecture","Environmental Readiness","Technology Readiness","All technology (projector, display, audio) operational and displaying correct content before position is taken. No troubleshooting during entry.","Technology operational on entry; correct content displaying","Technology not working at start; teacher troubleshooting during entry","Assistive technology for individual learners confirmed operational before entry"],["D1.P01.S03.3.1",1,"Coming in and routines","Entry & Exit Routines","Door Position Architecture","Greeting Architecture","Name Use Protocol","Teacher uses the student's first name as they pass the threshold - brief, warm, consistent. Every student, every lesson, after embedding.","Student name used on entry; brief; consistent across all students","Generic greeting only; names not used; greeting inconsistent","Name use is particularly connecting for EAL learners and those who feel invisible in large classes"],["D1.P01.S03.3.2",1,"Coming in and routines","Entry & Exit Routines","Door Position Architecture","Greeting Architecture","Eye Contact Standard","Brief eye contact made with each entering student. Two seconds maximum. Communicates recognition without interrupting the entry flow.","Eye contact evident; brief; teacher not looking at register or phone","Teacher looking at phone, register, or board; no eye contact; gaze absent","Adjusted greeting for learners with social communication differences - nod or gesture rather than direct eye contact where agreed"],["D1.P01.S03.3.3",1,"Coming in and routines","Entry & Exit Routines","Door Position Architecture","Greeting Architecture","Tailored Acknowledgement","For students who need additional relational connection, a slightly extended greeting is used - one additional specific comment. Pre-planned for identified students, not improvised.","Extended greeting for identified students; specific not generic; planned","Same greeting for all regardless of relational need; no tailoring","Pre-agreed greeting protocol for learners with high relational need, including SEMH profiles"],["D1.P02.S01.1.1",1,"Coming in and routines","Entry & Exit Routines","Entry Signal System","Signal Design and Consistency","Signal Distinctiveness","Entry signal is distinctly different from the attention signal and exit signal. Three different signals; students know each one. No confusion between them.","Three distinct signals identifiable; students respond differently to each","Same signal used for entry and attention; students confused about expected response","Distinct signals support learners who need clear environmental cues to regulate transitions"],["D1.P02.S01.1.2",1,"Coming in and routines","Entry & Exit Routines","Entry Signal System","Signal Design and Consistency","Signal Consistency","Exactly the same signal delivered in the same way every lesson. No variation. Signal becomes automatic environmental cue after embedding.","Identical signal every lesson; no variation; automatic student response after embedding","Signal varies; different words, gestures, or timing each lesson","Signal consistency is critical for autistic learners and those with processing needs"],["D1.P02.S01.1.3",1,"Coming in and routines","Entry & Exit Routines","Entry Signal System","Signal Design and Consistency","Class Agreement","Signal was established with the class through explicit agreement - not unilaterally imposed. Students understand what the signal means and what is expected in response.","Students can articulate what signal means; response expectations clear","Signal imposed without agreement; students unclear about expected response; signal not taught","Signal meaning explicitly taught and practised - especially important for new EAL learners to the class"],["D1.P02.S01.1.4",1,"Coming in and routines","Entry & Exit Routines","Entry Signal System","Signal Design and Consistency","Signal Without Explanation","After embedding, signal is delivered without explanation or context. Teacher does not announce 'the entry signal is...' It is recognised and responded to.","Signal delivered without explanation; students respond without being told","Teacher explains signal before delivering it; signal accompanied by commentary","Pre-session preparation for EAL learners who may need the signal's meaning confirming"],["D1.P02.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","Entry Signal System","Student Entry Pattern","Pattern Design","Order of entry is planned - by group, row, alphabetical, or Routines","Settling and Cognitive Activation","Anchor Task Architecture","Anchor as Retrieval","Anchor task retrieves prior knowledge connected to today's lesson - not a filler activity, not purely administrative. Task activates relevant schema before instruction begins.","Task content connects to lesson; retrieval evident; knowledge activation clear","Anchor is date writing or administrative only; unrelated to lesson; no retrieval","Retrieval task format adapted (visual matching, drawing, oral) without changing the knowledge demand"],["D1.P03.S01.1.2",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Anchor Task Architecture","Pre-Positioned Visibility","Task is visible before the first student arrives - on board, projected, or on desk card. No instruction required to begin. Students enter and begin without being told to.","Task visible on entry; students begin without instruction; no teacher prompt needed","Task written after students sit down; teacher directs students to begin; task requires explanation","Desk card format for learners who cannot read from the board; bilingual prompt for EAL"],["D1.P03.S01.1.3",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Anchor Task Architecture","Independent Difficulty","Task is calibrated so that every student can begin and work through it without teacher support. Not too challenging to start alone, not so easy it provides no value.","All students begin within 60 seconds; working without asking for help; task visible as meaningful","Some students unable to begin independently; many idle; task trivially easy","Parallel version available at same knowledge focus but adjusted format for SEND learners"],["D1.P03.S01.1.4",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Anchor Task Architecture","Lesson Connection","Task is designed to connect explicitly to the lesson that follows - not arbitrarily chosen. Teacher can articulate the connection if asked.","Teacher can state connection between anchor and lesson; connection evident in lesson","Anchor chosen for ease of delivery not lesson connection; same task used every lesson","Connection made explicit for EAL learners via brief bilingual note on task"],["D1.P03.S01.1.5",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Anchor Task Architecture","Task Sizing","Task is sized to fill the settling window - between 90 seconds and 4 minutes. Not finished in 30 seconds, not extending beyond the point where instruction should begin.","Task duration matches settling window; students occupied for full period; not abandoned early","Task too short - students idle; task too long - instruction delayed; timing not considered","Short-format version for learners who tire quickly; extension option for rapid completers"],["D1.P03.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Silent Start Protocol","Silence as Cultural Expectation","Silence during the anchor task is a class cultural expectation - not announced daily. Students understand that entry means work begins in silence.","No daily announcement of silence; students settle silently; expectation is internalised","Teacher announces 'in silence please' every lesson; expectation not internalised; prompted not expected","Silent start is a predictable environmental cue that supports self-regulation for many SEND profiles"],["D1.P03.S02.2.2",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Silent Start Protocol","Door Position During Silence","Teacher remains at the door position during the silence period. Scans for engagement. Does not move into the room until the attention signal is delivered.","Teacher at threshold during full silent start; scanning evident; position maintained","Teacher moves inside before silent start complete; talks to students during silence","Teacher presence at threshold during silence provides passive regulation support"],["D1.P03.S02.2.3",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Silent Start Protocol","Non-Verbal Correction of Silence","If the silence breaks, teacher corrects using a non-verbal signal from the threshold - not a verbal intervention. Verbal intervention during silence undermines the culture.","Non-verbal correction used; no teacher talking during silent start; correction from threshold","Teacher calls out to correct noise during silent start; verbal interaction contradicts culture","Pre-agreed non-verbal signal with individual learners who may need a personal redirect"],["D1.P03.S03.3.1",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Attention Signal and Transition to Instruction","Signal Distinctiveness from Entry","Attention signal is clearly different from entry signal - different action, sound, or phrase. Students know the distinction without being told.","Students respond differently to entry and attention signals; no confusion","Same or similar signal for entry and attention; student responses confused","Distinct signals with explicit teaching of each - important for learners who need explicit rule learning"],["D1.P03.S03.3.2",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Attention Signal and Transition to Instruction","Response Expectation","Students know exactly what to do when the attention signal is given: stop, look, listen. Response expectation has been explicitly taught and practised.","Students stop, look, and listen within 5 seconds of signal after embedding; no prompting needed","Variable response; students slow to respond; some continue working; response unpredictable","Response expectation explicitly rehearsed; visual anchor of expected response available for reference"],["D1.P03.S03.3.3",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Attention Signal and Transition to Instruction","Full Attention Before Instruction","Instruction begins only after full class attention is secured. Teacher does not begin talking over partial attention.","Teacher waits for full attention; instruction begins after clear signal of readiness","Teacher begins instruction over noise or partial attention; attention not secured before teaching","Full attention wait time is a respectful and regulating moment - normalised across all classes"],["D1.P03.S03.3.4",1,"Coming in and routines","Entry & Exit Routines","Settling and Cognitive Activation","Attention Signal and Transition to Instruction","Teacher Transition to Instructional Position","Teacher moves from threshold to instructional position in a deliberate, planned way - following the attention signal. Move is consistent and signals the shift to instruction.","Move follows attention signal; deliberate and consistent; marks the transition clearly","Teacher wanders from threshold to instruction without a clear marker; transition unclear","Predictable teacher movement supports learners who need visual environmental cues"],["D1.P04.S01.1.1",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Design","Transition Scripting","Every activity transition is scripted in lesson planning - not improvised. Teacher knows exactly how each transition will run before the lesson begins.","Transition steps evident in planning; smooth execution in lesson; no improvisation","Transitions improvised; teacher unsure how to manage mid-lesson movement; reactive","Pre-planned transition sequences particularly important when SEND learners need predictability"],["D1.P04.S01.1.2",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Design","Transition Expectation Communication","Before each transition, teacher communicates exactly what will happen: where students are going, what they will do, what materials they need, and what noise level is expected.","Four-part communication before transition; students prepared; no mid-transition questions","Students unclear about what to do during transition; questions asked during movement","Communication pre-prepared in accessible format for EAL learners; visual sequence shown"],["D1.P04.S01.1.3",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Design","Transition Timing","Explicit time allocated for transition - communicated to students before it begins. Transition has a defined end point, not an open-ended drift.","Timing communicated before transition; countdown used; transition ends at defined point","Transition open-ended; students unclear when it should end; drifts beyond intended time","Timer visual particularly important for learners who struggle with time perception"],["D1.P04.S01.1.4",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Design","Resource Management","What happens to materials during the transition is explicitly stated before it begins. Students know what to do with current materials before they move.","Material management stated before transition; students handle materials correctly; no confusion","Students unsure what to do with materials; books left open; wrong materials taken","Pre-stated material management reduces cognitive load during transition for SEND learners"],["D1.P04.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Movement Architecture","Movement Narration","During transition, teacher narrates each step briefly and sequentially - providing a verbal scaffold for the movement in real time. Not a script of reprimands - a sequence of what to do.","Positive sequential narration during transition; each step named; tone calm","Narration of what is going wrong; reactive commentary; narration absent","Sequential narration particularly supports learners with processing difficulties and EAL learners"],["D1.P04.S02.2.2",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Movement Architecture","Transition Timer","Timed transitions used consistently. Timer visible to students. Transition is expected to complete within the time. Timer communicates the expectation without the teacher repeating it.","Timer visible; transition completes within time; timer used consistently","No timer; transitions open-ended; teacher repeating urgency verbally; time not respected","Visual countdown timer particularly important for learners with time-blindness or ADHD profiles"],["D1.P04.S02.2.3",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Movement Architecture","Noise Level Expectation","Expected noise level during transition is stated before movement begins - not enforced reactively after noise occurs.","Noise level stated before transition begins; teacher does not react to noise during transition","Noise level managed reactively; teacher shouting over transition noise; expectation not pre-stated","Pre-stated noise level is a cognitive anchor - reduces uncertainty and anxiety during transitions"],["D1.P04.S02.2.4",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Movement Architecture","Arrival Position Expectation","Students know exactly what to do when they arrive at their new position - what to have out, where to look, what posture is expected. Communicated before movement.","Students settled at new position purposefully; know what to do on arrival; materials correct","Students arrive at new position uncertain; idle on arrival; waiting for instruction","Visual arrival anchor at new position for learners who need visual reminders of expectations"],["D1.P04.S03.3.1",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Reset Protocol","Reset Decision","Teacher makes a clear, deliberate decision to reset a transition that has not met the expected standard. Decision is made publicly, matter-of-factly, and without emotional loading.","Reset announced calmly and specifically; no emotional loading; matter-of-fact delivery","Teacher accepts poor transition; reset decision emotional or threatening; decision not made","Reset as routine expectation - not a punishment - normalises the process for all learners"],["D1.P04.S03.3.2",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Reset Protocol","Reset Language","Reset is communicated with specific, positive language: 'Let's try that again from the point where...' Not 'that was terrible' or 'you know better than that.'","Positive reset language used; specific starting point named; no blame language","Blame language used in reset; emotional tone; vague ('do it again'); no clear starting point","Consistent reset language reduces uncertainty for learners who are sensitive to tone or ambiguity"],["D1.P04.S03.3.3",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Reset Protocol","Reset Execution","Class returns to the defined starting point and the transition is repeated. Teacher narrates it again. Correct execution acknowledged specifically when achieved.","Transition repeated from defined point; narrated again; correct execution acknowledged","Reset attempted but not followed through; partial reset; correct execution not acknowledged","Reset is a low-stakes repetition - explicitly framed as practice, not consequence"],["D1.P04.S03.3.4",1,"Coming in and routines","Entry & Exit Routines","In-Lesson Transitions","Transition Reset Protocol","Reset Frequency Monitoring","Over time, the number of resets required for each transition decreases as routine embeds. Coach tracks reset frequency as an implementation indicator.","Reset frequency decreasing over weeks; coach tracking evident; embedding visible","Reset frequency stable or increasing; embedding not occurring; no tracking","High reset frequency in SEND-inclusive classes may signal that transitions need further adaptation, not more resets"],["D1.P05.S01.1.1",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Whole-Lesson Attention Management","Consistent Signal Throughout","The same attention signal is used for every attention-gathering moment in every lesson. Not a different phrase or gesture depending on context or urgency.","Same signal every time; no variation; signal automatic after embedding","Different signals in different contexts; signal varies by urgency; inconsistency","Signal consistency is particularly important for learners with autism, ADHD, or anxiety who depend on predictability"],["D1.P05.S01.1.2",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Whole-Lesson Attention Management","Continuous Scanning Protocol","Teacher scans the whole room continuously during instruction and practice. No blind spots. Teacher positioned to see all students at all times. No prolonged fixing on one area.","Continuous scanning evident; no blind spots; teacher position allows full room view","Teacher fixes on one group; blind spots; some students consistently unmonitored","Scanning includes monitoring of SEND learners' engagement without singling them out"],["D1.P05.S01.1.3",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Whole-Lesson Attention Management","Scanning Posture","During instruction, teacher is positioned to see all students - not desk-anchored, not board-turned, not facing away from the class. Positioning planned, not improvised.","Teacher positioned to see full class; not back to class; not anchored to one spot","Teacher turns to board during explanation; stands with back to class; desk-anchored during instruction","Position planning includes awareness of learners with hearing impairments who need to see teacher's face"],["D1.P05.S01.1.4",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Whole-Lesson Attention Management","Pre-emption of Off-Task","Teacher notices off-task behaviour at its first sign - a student looking away, a pen down, a whispered conversation - and responds before it spreads.","Early response to off-task; first sign addressed; spread prevented","Response only after behaviour is established or loud; first signs missed; reactive not pre-emptive","Non-verbal pre-emption is particularly valuable - avoids drawing attention to the off-task learner"],["D1.P05.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Positive Behaviour Narration","Narrating Compliance","During transitions and independent work, teacher narrates students who are meeting expectations: 'Row 2 have their books open and are working in silence.' This acknowledges the majority doing right - not the minority who aren't.","Narration names specific behaviours; narrates students doing right; used during transitions and practice","Narration absent; teacher only comments when behaviour is wrong; no positive narration","Narration creates psychological safety - most students feel noticed for doing the right thing, not surveilled"],["D1.P05.S02.2.2",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Positive Behaviour Narration","Narration Timing","Positive narration is used most during transitions and settling - not during explanation, when it interrupts cognitive focus. Timing of narration is planned.","Narration during transitions and practice; not during teacher explanation; timed appropriately","Narration used during explanation; interrupts instruction; timing not considered","Narration during transition particularly benefits learners with ADHD who need regular positive acknowledgement"],["D1.P05.S02.2.3",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Positive Behaviour Narration","Narration Precision","Narration names the specific behaviour, not just the student. 'Amara's pen is down and she's looking this way' not 'Well done Amara.' Precision is the key.","Specific behaviour named; precise; names the action not just the person","Generic narration ('well done'; 'good'); student named but not the behaviour; vague","Precise narration is a vocabulary and language model for EAL learners - shows what correct behaviour looks and sounds like"],["D1.P05.S02.2.4",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Positive Behaviour Narration","Warm Demander Positioning","Teacher holds two things simultaneously: high expectations and genuine warmth. Neither compromises the other. Expectation is not cold; warmth is not permissive.","Expectations clear and consistently applied; warmth evident in tone and relationship; neither absent","Expectations without warmth - cold classroom culture; warmth without expectations - permissive; one substitutes the other","Warm demander positioning is particularly important for SEND and SEMH learners who may associate expectations with threat"],["D1.P05.S03.3.1",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Precise Acknowledgement","Specific Over Generic","Acknowledgement names the specific action, not a vague quality. 'You went back and checked your working' not 'excellent.' Specificity builds self-awareness of what good looks like.","Acknowledgement names specific action; student can identify what was recognised","Generic praise ('well done'; 'brilliant'); student unclear why they were praised; vague","Specific acknowledgement helps EAL learners understand what successful behaviour and thinking looks like in this classroom"],["D1.P05.S03.3.2",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Precise Acknowledgement","Acknowledgement Timing","Acknowledgement is given as close to the behaviour as possible - during or immediately after. Not deferred to the end of the lesson.","Acknowledgement immediate; close to behaviour; not deferred","Acknowledgement deferred; commented on at end of lesson; delayed beyond the behaviour","Immediate acknowledgement is particularly important for learners with short working memory or ADHD profiles"],["D1.P05.S03.3.3",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Precise Acknowledgement","Private Acknowledgement","For students for whom public praise is counterproductive - documented and known - acknowledgement is given privately and briefly.","Private acknowledgement used for identified students; documented; brief","Same public acknowledgement for all regardless of individual need; SEND/SEMH needs not considered","Public praise can be distressing for some autistic learners and anxious students - private alternatives always available"],["D1.P05.S03.3.4",1,"Coming in and routines","Entry & Exit Routines","Attention Architecture and Positive Climate","Precise Acknowledgement","Acknowledgement Credibility","Acknowledgement is used selectively - not for every minor action. Its credibility depends on students sensing it is genuinely earned. Overuse dilutes its value.","Acknowledgement is selective; used for genuine achievement; students respond meaningfully","Constant acknowledgement for everything; overuse; students habituated and unresponsive","Calibrated acknowledgement is respectful to all learners - treats students as capable of earning recognition"],["D1.P06.S01.1.1",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Least Invasive Intervention Hierarchy","Non-Verbal First","Teacher responds to low-level behaviour with non-verbal intervention first - eye contact, proximity, a gesture. Verbal intervention is reserved for when non-verbal has not been effective.","Non-verbal first; verbal follows if needed; hierarchy evident; proportionate","Verbal correction immediate; no graduated response; non-verbal not used","Non-verbal intervention protects learner dignity - avoids public attention on behaviour"],["D1.P06.S01.1.2",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Least Invasive Intervention Hierarchy","Proximity Use","Moving physically closer to a student who is off-task often resolves the behaviour without any words. Teacher positions near the student, makes brief eye contact, continues teaching.","Proximity deployed; behaviour resolves without verbal; teacher continues instruction","Teacher stays at front and calls across; proximity not used; correction is public and distant","Proximity management planned for students with social communication or sensory needs - not all students respond positively to close physical proximity"],["D1.P06.S01.1.3",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Least Invasive Intervention Hierarchy","Private Correction Protocol","When verbal correction is required, it is delivered privately - crouching to student level, quiet voice, brief. Not broadcast to the class.","Correction delivered privately; quiet; brief; student level; class unaware","Correction broadcast to class; loud; public; student attention drawn to by teacher","Private correction is respectful and is particularly important for students with SEMH needs or anxiety"],["D1.P06.S01.1.4",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Least Invasive Intervention Hierarchy","Positive Direction Language","Correction describes what the student should be doing, not what they should stop doing. 'Your chair needs to be facing this way' not 'Stop turning around.'","Positive direction language used; 'what to do' not 'what to stop'; specific","Negative direction language ('stop'; 'don't'; 'no'); student told what not to do but not what to do instead","Positive direction language is particularly supportive for learners with processing difficulties who need a clear action, not an abstract instruction"],["D1.P06.S01.1.5",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Least Invasive Intervention Hierarchy","Escaping the Power Struggle","After delivering a correction, teacher moves away without waiting for visible compliance in front of the class. Gives the student time to comply without an audience.","Teacher delivers correction and moves; does not stand over student; compliance private","Teacher stands waiting for public compliance; escalates when immediate compliance not shown; power struggle develops","Exiting without watching is a dignity-protecting strategy - particularly critical for students with oppositional presentations"],["D1.P06.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Correction Language Protocols","Describe Behaviour Not Person","Correction describes the behaviour, not a quality of the person. 'The chair is pointing the wrong way' not 'You're being disruptive.' Behaviour is correctable; character is not.","Behaviour described not person; specific; non-attributional","Person-attributing language ('you're being...'); character judgements; shame-based","Behaviour-focused language is respectful and non-threatening for learners with SEMH needs"],["D1.P06.S02.2.2",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Correction Language Protocols","Team Language Consistency","All teachers and TAs use the same correction phrases. Language is agreed, trained, and applied consistently across the school. Students encounter the same language regardless of room.","Same correction phrases across teaching team; students recognise language; consistent","Different teachers use different phrases; inconsistency; students play different adults against each other","Consistency is particularly important for SEND learners who may be taught by multiple adults and need consistent behavioural language"],["D1.P06.S02.2.3",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Correction Language Protocols","Tone Consistency","Correction tone is matter-of-fact and warm regardless of the frequency of the behaviour. Teacher does not escalate tone as frustration grows. Tone is a practised, rehearsed skill.","Tone consistent regardless of frequency; matter-of-fact; warm; not escalating","Tone escalates with frequency; frustration evident; emotional loading increases with repeated behaviour","Tone consistency is a skill built through deliberate practice - not a personality trait. Coached and rehearsed."],["D1.P06.S02.2.4",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Correction Language Protocols","De-escalation Language Sequences","For escalating situations, teacher has rehearsed and specific de-escalation language sequences. Not improvised under pressure. Sequences agreed with leadership.","De-escalation sequences used; not improvised; agreed with leadership; effective","De-escalation improvised; escalation continues; teacher unsure what to say; emotional under pressure","De-escalation sequences are developed in consultation with SENCO for students with complex profiles"],["D1.P06.S03.3.1",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Routine Re-establishment","Do-It-Again for Routines","When a routine has not been executed to the expected standard, it is repeated. The class re-does the routine until the correct version is achieved. This is a practice tool, not a punishment.","Routine repeated after failure; correct version achieved; framed as practice","Failed routine accepted; standard lowered; routine not repeated; expectation dropped","Do-it-again framed positively - practising until it's right - reduces threat for anxious or SEMH learners"],["D1.P06.S03.3.2",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Routine Re-establishment","Re-establishment Without Drama","Routine re-establishment is calm, expected, and unemotional. Teacher communicates it as a normal part of building the routine - not as a consequence for bad behaviour.","Calm tone; routine framing ('let's practise that again'); unemotional; no drama","Emotional re-establishment; punishment framing; students feel shamed; escalation during re-establishment","Unemotional routine re-establishment is a co-regulation tool - particularly valuable for emotionally dysregulated learners"],["D1.P06.S03.3.3",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Routine Re-establishment","Standard Consistency After Re-establishment","After a routine is re-established, the same standard is maintained in subsequent lessons. Standard is not lowered because the class struggled previously.","Same standard maintained after re-establishment; no lowering of expectation","Standard lowered after difficult session; different expectations for different classes; inconsistency","Consistent standards across classes are important for SEND learners who move between groups or teachers"],["D1.P06.S03.3.4",1,"Coming in and routines","Entry & Exit Routines","Correction and Reset Protocols","Routine Re-establishment","Team Re-establishment Consistency","All members of the teaching team re-establish routines with the same language, framing, and expectation. No member accepts a lower standard.","Whole team consistent in re-establishment; language consistent; standard consistent","Different standards across team members; some accept lower standard; inconsistency undermines routine","Team consistency calibrated in coaching team meetings and joint walkthroughs"],["D1.P07.S01.1.1",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Close Signal and Learning Reflection","Close Signal Timing","Explicit close signal delivered minimum 3 minutes before lesson end - not improvised at the bell. Signal is pre-planned and part of lesson structure, not reactive to the clock.","Signal at minimum 3 minutes before bell; consistent timing; planned not reactive","Signal at bell; close skipped when lesson overruns; timing reactive; no signal","Visual timer throughout lesson so close signal is not a surprise - important for learners with time anxiety"],["D1.P07.S01.1.2",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Close Signal and Learning Reflection","Close Signal Distinctiveness","Close signal is different from both the attention signal and entry signal. Students know it signals the end of instruction and the beginning of exit routines.","Distinct signal; students respond with exit routine initiation; no confusion with other signals","Same signal as attention; students confused; close not distinguished from mid-lesson attention call","Three distinct signals explicitly taught and practised - particularly for learners who need explicit rule teaching"],["D1.P07.S01.1.3",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Close Signal and Learning Reflection","Learning Reflection Question","Teacher asks one specific, targeted question about what was learned. Question connects directly to the lesson objective - not 'what did you learn today?' but something precise.","Specific question; connects to lesson objective; not vague; student response required","Vague reflection question; no question asked; reflection skipped when time is short","Sentence stem or visual prompt supports EAL learners and SEND learners in formulating their response"],["D1.P07.S01.1.4",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Close Signal and Learning Reflection","Reflection Response Format","Students respond to reflection question in writing or via a structured verbal format. Response is not optional. Not a whole-class discussion where some students can remain silent.","Written or structured verbal response; all students respond; not optional; not whole-class discussion only","Discussion-only format; some students don't respond; reflection is optional; verbal only","Written format removes performance pressure; supports learners who need processing time before responding"],["D1.P07.S02.2.1",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Consolidation and Forward Activation","Next-Lesson Preview","Teacher delivers one specific sentence about what comes next lesson. Not a full explanation - a precise hook. Activates anticipation and reduces transition anxiety.","One sentence; specific; not a full explanation; activates curiosity","No preview; overly detailed explanation of next lesson; preview skipped when rushed","Written preview card given to learners who need predictability about future sessions"],["D1.P07.S02.2.2",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Consolidation and Forward Activation","Materials Consolidation Routine","Established routine for organising, packing, or handing in materials. Sequence is rehearsed, predictable, and student-led after embedding. Teacher does not narrate each step daily.","Student-led consolidation; consistent sequence; no teacher narration after embedding","Teacher narrates every step daily even after weeks; routine not embedded; sequence varies","Visual sequence card for consolidation steps for learners with sequencing or memory difficulties"],["D1.P07.S02.2.3",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Consolidation and Forward Activation","Routine Independence","After embedding, the consolidation routine runs without teacher direction. Students complete it autonomously. Teacher can use this time for individual conversations.","Students complete consolidation without instruction; teacher free for brief individual interactions","Teacher directing consolidation every lesson; no autonomy; routine not embedded after weeks","Routine independence achieved earlier for some learners than others - individual pathway"],["D1.P07.S02.2.4",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Consolidation and Forward Activation","Homework and Follow-Up Clarity","If homework or follow-up tasks are set, direction is specific, brief, displayed, and given with enough time before the bell. Not verbal-only, not given at the door.","Homework displayed and communicated clearly with time remaining; specific; brief","Homework at the door; verbal only; no time to note it down; vague about task","Homework instructions sent home in written form for learners who cannot reliably transfer information"],["D1.P07.S03.3.1",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Deliberate Dismissal","Sequenced Dismissal","Dismissal is by group, table, or row - sequenced and teacher-controlled. Not all at once. Not a race to the door.","Sequenced by group; teacher controls timing; calm; deliberate","Whole class dismissed at once; rush to door; reactive to bell; teacher not in control","Named group or individual dismissal available for learners with corridor anxiety or social difficulties"],["D1.P07.S03.3.2",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Deliberate Dismissal","Departure Acknowledgement","Teacher delivers a brief individual acknowledgement as students leave - mirrors the entry greeting. Name used. Brief and warm.","Name used on exit; brief acknowledgement; warm; mirrors entry greeting","No departure acknowledgement; generic 'bye'; no individual contact at exit","Departure acknowledgement provides relational closure - important for learners with SEMH needs or attachment difficulties"],["D1.P07.S03.3.3",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Deliberate Dismissal","Calm Exit Expectation","Exit is calm, deliberate, and quiet. The expectation for exit behaviour is the same as entry behaviour. Corridor culture is the teacher's responsibility until the student is out of sight.","Calm exit; teacher at threshold until students have left; expectation maintained","Students rush out; noise level at exit inconsistent with entry standard; teacher does not manage exit","Consistent calm exit expectation models the transition regulation that benefits all learners, particularly anxious ones"],["D1.P07.S03.3.4",1,"Coming in and routines","Entry & Exit Routines","Exit Architecture","Deliberate Dismissal","Room Readiness for Next Class","Classroom is left in a state that supports the next teacher's entry routine - chairs straight, board clear if needed, resources returned. Part of the exit routine, not a separate task.","Room in appropriate state after exit; part of routine; not added last-minute","Room left in disarray; next teacher's entry undermined; room-readiness not part of routine","Room readiness as a shared responsibility - taught to students as a mark of respect for the community"],["D2.P01.S01.1.1",2,"Showing them how","Explicit Modelling","Explanation Architecture","Concrete to Abstract Sequencing","Concrete Foundation","New concepts introduced with a concrete, physical, or tangible representation first - an object, a manipulative, a real example. Abstract notation is not the entry point.","Concrete representation precedes abstract; physical or real-world example used first","Abstract notation introduced immediately; concrete phase skipped; concept presented symbolically first","Concrete-first approach is critical for EAL learners who may lack the language for abstract concepts; and for SEND learners with processing difficulties"],["D2.P01.S01.1.2",2,"Showing them how","Explicit Modelling","Explanation Architecture","Concrete to Abstract Sequencing","Pictorial Bridge","After the concrete, teacher builds a pictorial or diagrammatic bridge - representing the same concept visually before introducing symbolic notation.","Visual/pictorial representation follows concrete; same concept in diagram before symbols","Jump from concrete to abstract without pictorial stage; no visual bridge; symbolic too early","Visual representation provides a persistent reference for EAL and SEND learners during subsequent independent work"],["D2.P01.S01.1.3",2,"Showing them how","Explicit Modelling","Explanation Architecture","Concrete to Abstract Sequencing","Abstract Introduction Timing","Abstract notation, symbols, or formal language introduced only after the concept is understood through concrete and pictorial representations.","Abstract introduced after concrete and pictorial; understanding evident before formalisation","Abstract introduced too early; students learn notation without conceptual understanding","Timing decision documented in lesson planning - not improvised"],["D2.P01.S01.1.4",2,"Showing them how","Explicit Modelling","Explanation Architecture","Concrete to Abstract Sequencing","Sequence Planning","The concrete-to-abstract sequence is planned explicitly in lesson preparation - not improvised. Teacher can articulate which representation they will use at each point.","Sequence documented in planning; deliberate representation choices; teacher can articulate rationale","Representation choices improvised; no planning; teacher unclear which stage they are at","Sequence planning includes planning SEND adaptations at each stage of the C-P-A progression"],["D2.P01.S02.2.1",2,"Showing them how","Explicit Modelling","Explanation Architecture","Example and Non-Example Design","Worked Example Selection Criteria","The worked example is selected because it represents the most important and frequently encountered application of the concept - not chosen for convenience.","Example selection rationale clear; represents key application; not convenient choice","Example chosen for ease of delivery; atypical example; does not represent core application","Example selection considers the cultural and contextual accessibility of the example for EAL and international learners"],["D2.P01.S02.2.2",2,"Showing them how","Explicit Modelling","Explanation Architecture","Example and Non-Example Design","Non-Example Provision","Non-examples show precisely what the concept is NOT - contrasting with the correct example. Students see the boundary of the concept, not just the centre.","Non-example alongside worked example; boundary of concept visible; contrast evident","No non-examples; students see only correct examples; boundaries of concept unclear","Non-examples explicitly labelled and discussed - not left for students to infer"],["D2.P01.S02.2.3",2,"Showing them how","Explicit Modelling","Explanation Architecture","Example and Non-Example Design","Comparison Design","Correct and incorrect examples are presented together for direct comparison. Students identify the differences. The contrast does the teaching.","Side-by-side comparison; students identify difference; contrast explicit","Examples presented separately; no comparison; contrast left to student inference","Structured comparison scaffold available for learners who need explicit guidance on what to compare"],["D2.P01.S02.2.4",2,"Showing them how","Explicit Modelling","Explanation Architecture","Example and Non-Example Design","Example Sequencing","Examples move from simple to complex; canonical before unusual; central cases before edge cases. Sequence is planned.","Simple to complex sequence; canonical first; edge cases after understanding is established","Complex or unusual example first; no progression; edge cases confused with central cases","Simple canonical example available as a reference point throughout the lesson for SEND learners"],["D2.P01.S03.3.1",2,"Showing them how","Explicit Modelling","Explanation Architecture","Display and Board Architecture","Board as Student Notes","What appears on the board mirrors exactly what students should have in their notes or books. Board is not the teacher's planning space - it is the student's learning record.","Board content mirrors student notes; correspondence evident; board is a model for student work","Board used as teacher planning space; content doesn't correspond to student notes; mismatch","Students who cannot copy quickly given printed version; board photograph option for SEND learners"],["D2.P01.S03.3.2",2,"Showing them how","Explicit Modelling","Explanation Architecture","Display and Board Architecture","Board Organisation","Board is organised, legible, and structured - divided into clear sections, consistent layout, planned before the lesson.","Clear sections; legible handwriting; planned layout; not random or cluttered","Disorganised board; writing too small; random placement; no sections","Board organisation reduces cognitive load for all learners - particularly those with processing, attention, or visual difficulties"],["D2.P01.S03.3.3",2,"Showing them how","Explicit Modelling","Explanation Architecture","Display and Board Architecture","Display Persistence","Key information - vocabulary, worked examples, step annotations - remains on the board throughout the lesson. Not erased during guided or independent practice.","Key content persists throughout lesson; not erased mid-lesson; students can reference it","Board erased after explanation; worked example gone during practice; students cannot reference","Display persistence is a scaffolding mechanism - particularly important for learners with memory difficulties"],["D2.P01.S03.3.4",2,"Showing them how","Explicit Modelling","Explanation Architecture","Display and Board Architecture","Dual Representation","Visual and verbal information are presented simultaneously - diagram alongside verbal explanation, text alongside image. Both channels used together.","Visual and verbal paired; diagram accompanies explanation; not one or the other alternating","Only verbal explanation; visual added separately and disconnected; not integrated","Dual representation reduces language dependency - critical for EAL learners and beneficial for all visual learners"],["D2.P02.S01.1.1",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Identification and Prioritisation","Vocabulary Tiering","Vocabulary organised by function: domain-specific technical terms, high-frequency academic language, and everyday words that unlock comprehension. Teaching decisions vary by tier.","Three tiers identifiable in planning; different teaching approaches for each tier","All vocabulary treated equally; no prioritisation; same approach for technical and everyday words","Vocabulary tiering is particularly important for EAL learners who may lack academic language that native speakers have acquired incidentally"],["D2.P02.S01.1.2",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Identification and Prioritisation","Lesson Vocabulary Limit","Maximum vocabulary set for explicit teaching per lesson - 5 to 7 new items maximum. Vocabulary selection is disciplined, not comprehensive.","Vocabulary set is bounded; maximum respected; selection is prioritised","Unlimited vocabulary introduced; students overwhelmed; vocabulary teaching superficial","Limited explicit vocabulary reduces cognitive overload - particularly beneficial for SEND and EAL learners"],["D2.P02.S01.1.3",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Identification and Prioritisation","High-Leverage Identification","From the lesson vocabulary, teacher identifies the 2-3 words that are highest-leverage - the words that unlock the most understanding if mastered.","High-leverage words identified; more teaching time allocated to them; prioritisation clear","Equal time for all vocabulary; highest-leverage words not distinguished; coverage over depth","High-leverage vocabulary pre-taught before lesson for identified SEND and EAL learners"],["D2.P02.S01.1.4",2,"Showing them how","Explicit Modelling","Vocabulary Instruction Architecture","Vocabulary Id
